    <text x="745" y="615" text-anchor="middle" font-size="14" fill="#D5D8DC">月之暗面估值（美元）</text>
  </g>
  
  
  <text x="1200" y="680" text-anchor="end" font-family="Arial" font-size="14" fill="#7F8C8D">
