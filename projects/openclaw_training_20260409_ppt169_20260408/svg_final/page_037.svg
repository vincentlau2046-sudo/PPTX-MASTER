<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">常用命令速查</text>
  <rect x="60" y="90" width="100" height="4" fill="#ed8936" rx="2"/>
  <g transform="translate(60, 130)">
    <rect width="560" height="520" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="30" y="45" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1a365d">Cron 管理</text>
    <text x="30" y="80" font-family="monospace" font-size="13" fill="#3182ce">cron list</text>
    <text x="30" y="105" font-family="monospace" font-size="13" fill="#718096">列出所有任务</text>
    <text x="30" y="140" font-family="monospace" font-size="13" fill="#3182ce">cron add --job &lt;job.json&gt;</text>
    <text x="30" y="165" font-family="monospace" font-size="13" fill="#718096">添加任务</text>
    <text x="30" y="200" font-family="monospace" font-size="13" fill="#3182ce">cron run --jobId &lt;id&gt;</text>
    <text x="30" y="225" font-family="monospace" font-size="13" fill="#718096">手动触发</text>
    <text x="30" y="260" font-family="monospace" font-size="13" fill="#3182ce">cron runs --jobId &lt;id&gt;</text>
    <text x="30" y="285" font-family="monospace" font-size="13" fill="#718096">查看执行历史</text>
    <text x="30" y="330" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1a365d">会话管理</text>
    <text x="30" y="365" font-family="monospace" font-size="13" fill="#38b2ac">sessions_list</text>
    <text x="30" y="390" font-family="monospace" font-size="13" fill="#718096">列出会话</text>
    <text x="30" y="425" font-family="monospace" font-size="13" fill="#38b2ac">sessions_history --sessionKey &lt;key&gt;</text>
    <text x="30" y="450" font-family="monospace" font-size="13" fill="#718096">查看会话历史</text>
    <text x="30" y="485" font-family="monospace" font-size="13" fill="#38b2ac">sessions_spawn(...)</text>
    <text x="30" y="510" font-family="monospace" font-size="13" fill="#718096">启动子 Agent</text>
  </g>
  <g transform="translate(640, 130)">
    <rect width="560" height="250" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="30" y="45" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1a365d">子 Agent 管理</text>
    <text x="30" y="80" font-family="monospace" font-size="13" fill="#ed8936">subagents list</text>
    <text x="30" y="105" font-family="monospace" font-size="13" fill="#718096">列出子 Agent</text>
    <text x="30" y="140" font-family="monospace" font-size="13" fill="#ed8936">subagents kill --target &lt;id&gt;</text>
    <text x="30" y="165" font-family="monospace" font-size="13" fill="#718096">终止子 Agent</text>
    <text x="30" y="200" font-family="monospace" font-size="13" fill="#ed8936">subagents steer --target &lt;id&gt;</text>
    <text x="30" y="225" font-family="monospace" font-size="13" fill="#718096">指导子 Agent</text>
  </g>
  <g transform="translate(640, 400)">
    <rect width="560" height="250" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="30" y="45" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1a365d">任务监控</text>
    <text x="30" y="80" font-family="monospace" font-size="13" fill="#805ad5">cat shared/task_status.md</text>
    <text x="30" y="105" font-family="monospace" font-size="13" fill="#718096">查看任务状态</text>
    <text x="30" y="140" font-family="monospace" font-size="13" fill="#805ad5">cat shared/.scheduler/log.md</text>
    <text x="30" y="165" font-family="monospace" font-size="13" fill="#718096">查看调度日志</text>
    <text x="30" y="200" font-family="monospace" font-size="13" fill="#805ad5">openclaw status</text>
    <text x="30" y="225" font-family="monospace" font-size="13" fill="#718096">查看系统状态</text>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">37 / 38</text>
</svg>
