<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="gwGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2c5282"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#f7fafc"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">技术架构总览</text>
  <rect x="60" y="90" width="100" height="4" fill="#ed8936" rx="2"/>
  <!-- Gateway 核心框 -->
  <rect x="340" y="140" width="600" height="320" rx="16" fill="url(#gwGrad)"/>
  <text x="640" y="170" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">OpenClaw Gateway</text>
  <!-- 内部组件 -->
  <g transform="translate(360, 200)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#3182ce"/>
    <text x="65" y="45" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Session</text>
    <text x="65" y="65" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#bee3f8">Manager</text>
  </g>
  <g transform="translate(510, 200)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#38b2ac"/>
    <text x="65" y="45" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Cron</text>
    <text x="65" y="65" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#b2f5ea">Scheduler</text>
  </g>
  <g transform="translate(660, 200)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#ed8936"/>
    <text x="65" y="45" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Skills</text>
    <text x="65" y="65" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#feebc8">Engine</text>
  </g>
  <g transform="translate(810, 200)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#805ad5"/>
    <text x="65" y="45" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Memory</text>
    <text x="65" y="65" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#e9d8fd">System</text>
  </g>
  <g transform="translate(430, 300)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#e53e3e"/>
    <text x="65" y="45" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Multi-</text>
    <text x="65" y="65" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#fed7d7">Agent</text>
  </g>
  <g transform="translate(580, 300)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#dd6b20"/>
    <text x="65" y="45" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Tools</text>
    <text x="65" y="65" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#feebc8">Proxy</text>
  </g>
  <g transform="translate(730, 300)">
    <rect x="0" y="0" width="130" height="80" rx="8" fill="#2b6cb0"/>
    <text x="65" y="45" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Message</text>
    <text x="65" y="65" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#bee3f8">Router</text>
  </g>
  <!-- 连接线 -->
  <line x1="640" y1="420" x2="640" y2="480" stroke="#3182ce" stroke-width="2" stroke-dasharray="5,5"/>
  <!-- 外部组件 -->
  <g transform="translate(490, 490)">
    <rect x="0" y="0" width="300" height="70" rx="8" fill="#ebf8ff" stroke="#3182ce" stroke-width="2"/>
    <text x="150" y="42" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">Main Agent (主会话)</text>
  </g>
  <g transform="translate(150" y="490)">
    <rect x="0" y="0" width="280" height="70" rx="8" fill="#fef3e2" stroke="#ed8936" stroke-width="2"/>
    <text x="140" y="42" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">Sub Agents (子会话)</text>
  </g>
  <g transform="translate(830" y="490)">
    <rect x="0" y="0" width="280" height="70" rx="8" fill="#faf5ff" stroke="#805ad5" stroke-width="2"/>
    <text x="140" y="42" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">External Tools (飞书/GitHub等)</text>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">05 / 38</text>
</svg>
