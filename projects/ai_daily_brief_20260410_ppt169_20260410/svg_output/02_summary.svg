  </text>
  
  <!-- Key Conclusion -->
  <rect x="60" y="440" width="1160" height="140" fill="#F8F9FA" stroke="#CF002E" stroke-width="2" rx="8"/>
  <rect x="60" y="440" width="8" height="140" fill="#CF002E" rx="8"/>
  <text x="100" y="485" fill="#CF002E" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold">
    🔑 核心结论
  </text>
  <text x="100" y="530" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="normal">
    2026 年 Q2 开源模型已具备与闭源模型正面竞争能力，智能体长程任务执行成为新战场。
  </text>
  
  <!-- Footer -->
  <text x="1220" y="700" text-anchor="end" fill="#999999" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">
    2026-04-10 | 02
  </text>
</svg>
