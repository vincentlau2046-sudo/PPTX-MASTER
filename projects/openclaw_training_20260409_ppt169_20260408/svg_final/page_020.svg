<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="caseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3182ce"/>
      <stop offset="100%" style="stop-color:#2c5282"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">实战案例：国际形势日报</text>
  <rect x="60" y="90" width="120" height="4" fill="#ed8936" rx="2"/>
  <!-- 案例介绍 -->
  <g transform="translate(60, 130)">
    <rect width="580" height="400" rx="12" fill="url(#caseGrad)"/>
    <text x="30" y="45" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">任务背景</text>
    <g transform="translate(30, 80)">
      <circle cx="10" cy="10" r="6" fill="#a0aec0"/>
      <text x="30" y="16" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#e2e8f0">需求：每天早上 8 点获取国际形势 5 分钟快读</text>
    </g>
    <g transform="translate(30, 115)">
      <circle cx="10" cy="10" r="6" fill="#a0aec0"/>
      <text x="30" y="16" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#e2e8f0">内容：中东局势、俄乌冲突、中美关系、全球市场</text>
    </g>
    <g transform="translate(30, 150)">
      <circle cx="10" cy="10" r="6" fill="#a0aec0"/>
      <text x="30" y="16" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#e2e8f0">输出：飞书推送 + Markdown 文档</text>
    </g>
    <text x="30" y="220" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">执行数据</text>
    <g transform="translate(30, 255)">
      <circle cx="10" cy="10" r="6" fill="#38b2ac"/>
      <text x="30" y="16" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#e2e8f0">启动 → 完成：124 秒</text>
    </g>
    <g transform="translate(30, 290)">
      <circle cx="10" cy="10" r="6" fill="#ed8936"/>
      <text x="30" y="16" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#e2e8f0">输出：约 1800 字</text>
    </g>
    <g transform="translate(30, 325)">
      <circle cx="10" cy="10" r="6" fill="#805ad5"/>
      <text x="30" y="16" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#e2e8f0">搜索主题：7 个</text>
    </g>
    <g transform="translate(30, 360)">
      <circle cx="10" cy="10" r="6" fill="#e53e3e"/>
      <text x="30" y="16" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#e2e8f0">飞书推送：✅ 成功</text>
    </g>
  </g>
  <!-- 输出示例 -->
  <g transform="translate(660, 130)">
    <rect width="580" height="400" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="30" y="45" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#1a365d">输出示例</text>
    <rect x="30" y="70" width="520" height="300" rx="8" fill="#1a365d"/>
    <text x="45" y="100" font-family="monospace" font-size="13" fill="#a0aec0"># 🌍 国际形势日报 | 2026-04-08</text>
    <text x="45" y="130" font-family="monospace" font-size="13" fill="#a0aec0">---</text>
    <text x="45" y="160" font-family="monospace" font-size="13" fill="#ed8936">## 一、【头条・深度解析】</text>
    <text x="45" y="190" font-family="monospace" font-size="13" fill="#38b2ac">### 1. 美伊停火谈判陷入僵局</text>
    <text x="60" y="220" font-family="monospace" font-size="12" fill="#a0aec0">事件：双方立场"差距过大"</text>
    <text x="60" y="245" font-family="monospace" font-size="12" fill="#a0aec0">影响：霍尔木兹海峡持续关闭</text>
    <text x="60" y="270" font-family="monospace" font-size="12" fill="#a0aec0">风险信号：🔴 高危</text>
    <text x="45" y="310" font-family="monospace" font-size="13" fill="#805ad5">## 二、【区域要闻】</text>
    <text x="45" y="340" font-family="monospace" font-size="13" fill="#a0aec0">- 亚太（3-4 条）</text>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">20 / 38</text>
</svg>
