  </text>
  <text x="95" y="250" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    • 不受限于单一模型
  </text>
  <rect x="95" y="285" width="295" height="60" fill="#FFF5F5" stroke="#CF002E" stroke-width="1" rx="6"/>
  <text x="110" y="310" fill="#CF002E" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold">
    🌟 全球云厂商中仅阿里云提供
  </text>
  <text x="110" y="335" fill="#999999" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">
    2 月 25 日发布
  </text>
  
  <!-- Card 2: MiniMax M2.5 -->
  <rect x="460" y="120" width="360" height="260" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" rx="8"/>
  <rect x="460" y="120" width="8" height="260" fill="#0066CC" rx="8"/>
  <text x="495" y="165" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">
    MiniMax M2.5
  </text>
  <text x="495" y="200" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
