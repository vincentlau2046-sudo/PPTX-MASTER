<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2c5282"/>
    </linearGradient>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3182ce"/>
      <stop offset="100%" style="stop-color:#4299e1"/>
    </linearGradient>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38b2ac"/>
      <stop offset="100%" style="stop-color:#4fd1c5"/>
    </linearGradient>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ed8936"/>
      <stop offset="100%" style="stop-color:#f6ad55"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#f7fafc"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">目录导航</text>
  <rect x="60" y="90" width="80" height="4" fill="#ed8936" rx="2"/>
  <!-- 第一篇 -->
  <g transform="translate(100, 140)">
    <rect width="540" height="240" rx="16" fill="url(#bgGrad1)"/>
    <text x="40" y="50" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" fill="#a0aec0">PART 01</text>
    <text x="40" y="90" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">原理篇</text>
    <text x="40" y="130" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" fill="#a0aec0">OpenClaw 技术基础</text>
    <text x="40" y="200" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#e2e8f0">• 技术架构    • 信息架构    • 记忆架构</text>
    <text x="40" y="225" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#e2e8f0">• 技能架构    • SubAgent    • Cron 调度</text>
  </g>
  <!-- 第二篇 -->
  <g transform="translate(660, 140)">
    <rect width="540" height="240" rx="16" fill="url(#bgGrad2)"/>
    <text x="40" y="50" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" fill="#bee3f8">PART 02</text>
    <text x="40" y="90" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">实践篇：定时任务</text>
    <text x="40" y="130" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" fill="#bee3f8">第一个 OpenClaw 定时任务</text>
    <text x="40" y="200" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#ebf8ff">• 关键要素    • 实战案例    • 复盘与避坑</text>
  </g>
  <!-- 第三篇 -->
  <g transform="translate(100, 400)">
    <rect width="540" height="240" rx="16" fill="url(#bgGrad3)"/>
    <text x="40" y="50" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" fill="#b2f5ea">PART 03</text>
    <text x="40" y="90" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">实践篇：技能开发</text>
    <text x="40" y="130" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" fill="#b2f5ea">第一个 OpenClaw 技能开发</text>
    <text x="40" y="200" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#e6fffa">• 关键要素    • 实战案例    • 常见坑与方案</text>
  </g>
  <!-- 第四篇 -->
  <g transform="translate(660, 400)">
    <rect width="540" height="240" rx="16" fill="url(#bgGrad4)"/>
    <text x="40" y="50" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" fill="#feebc8">PART 04</text>
    <text x="40" y="90" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">实践篇：Multi-Agent</text>
    <text x="40" y="130" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" fill="#feebc8">Multi-Agent 体系开发</text>
    <text x="40" y="200" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#fffaf0">• 核心概念    • 任务路由    • 监控与运维</text>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">03 / 38</text>
</svg>
