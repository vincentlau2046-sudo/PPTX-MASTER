  </text>
  <text x="490" y="335" fill="#0066CC" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold">
    性能接近顶尖闭源模型
  </text>
  
  <!-- Card 3 - Right -->
  <rect x="860" y="120" width="360" height="280" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" rx="8"/>
  <rect x="860" y="120" width="6" height="280" fill="#00AA55" rx="8"/>
  <text x="890" y="165" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">
    AGI 通用智能体突破
  </text>
  <text x="890" y="205" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
