<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">信息架构：数据持久化</text>
  <rect x="60" y="90" width="120" height="4" fill="#ed8936" rx="2"/>
  <g transform="translate(100, 150)">
    <rect width="1080" height="450" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <!-- 表头 -->
    <rect x="0" y="0" width="1080" height="50" fill="#1a365d" rx="12"/>
    <text x="30" y="32" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">数据类型</text>
    <text x="400" y="32" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">存储位置</text>
    <text x="800" y="32" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">用途</text>
    <!-- 行 -->
    <g transform="translate(0, 70)">
      <rect width="1080" height="65" fill="#ebf8ff"/>
      <text x="30" y="38" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">会话历史</text>
      <text x="400" y="38" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">Gateway 内存 + 数据库</text>
      <text x="800" y="38" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">对话上下文</text>
    </g>
    <g transform="translate(0, 140)">
      <rect width="1080" height="65" fill="#ffffff"/>
      <text x="30" y="38" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">长期记忆</text>
      <text x="400" y="38" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">MEMORY.md</text>
      <text x="800" y="38" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">用户偏好、重要事件</text>
    </g>
    <g transform="translate(0, 210)">
      <rect width="1080" height="65" fill="#fef3e2"/>
      <text x="30" y="38" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">每日日志</text>
      <text x="400" y="38" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">memory/YYYY-MM-DD.md</text>
      <text x="800" y="38" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">原始执行记录</text>
    </g>
    <g transform="translate(0, 280)">
      <rect width="1080" height="65" fill="#ffffff"/>
      <text x="30" y="38" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">自我改进</text>
      <text x="400" y="38" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">~/self-improving/</text>
      <text x="800" y="38" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">执行优化规则</text>
    </g>
    <g transform="translate(0, 350)">
      <rect width="1080" height="65" fill="#e6fffa"/>
      <text x="30" y="38" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">任务状态</text>
      <text x="400" y="38" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">shared/task_status.md</text>
      <text x="800" y="38" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">Multi-Agent 任务跟踪</text>
    </g>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">08 / 38</text>
</svg>
