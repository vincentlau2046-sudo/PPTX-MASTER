<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">技能文件结构</text>
  <rect x="60" y="90" width="100" height="4" fill="#ed8936" rx="2"/>
  <g transform="translate(60, 140)">
    <rect width="1160" height="500" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="30" y="45" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1a365d">文件清单</text>
    <g transform="translate(30, 80)">
      <rect x="0" y="0" width="540" height="70" rx="8" fill="#ffffff" stroke="#3182ce" stroke-width="2"/>
      <text x="20" y="30" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">SKILL.md</text>
      <text x="20" y="55" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">技能定义、触发规则、执行流程（必须）</text>
    </g>
    <g transform="translate(590, 80)">
      <rect x="0" y="0" width="540" height="70" rx="8" fill="#ffffff" stroke="#38b2ac" stroke-width="2"/>
      <text x="20" y="30" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">scripts/</text>
      <text x="20" y="55" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">执行脚本 Python/Shell/Node.js（必须）</text>
    </g>
    <g transform="translate(30, 160)">
      <rect x="0" y="0" width="540" height="70" rx="8" fill="#ffffff" stroke="#ed8936" stroke-width="2"/>
      <text x="20" y="30" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">references/</text>
      <text x="20" y="55" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">参考文档和模板（可选）</text>
    </g>
    <g transform="translate(590, 160)">
      <rect x="0" y="0" width="540" height="70" rx="8" fill="#ffffff" stroke="#805ad5" stroke-width="2"/>
      <text x="20" y="30" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">templates/</text>
      <text x="20" y="55" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">模板库 布局/图表/图标（可选）</text>
    </g>
    <g transform="translate(30, 240)">
      <rect x="0" y="0" width="540" height="70" rx="8" fill="#ffffff" stroke="#e53e3e" stroke-width="2"/>
      <text x="20" y="30" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">output/</text>
      <text x="20" y="55" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">技能输出目录（可选）</text>
    </g>
    <g transform="translate(590, 240)">
      <rect x="0" y="0" width="540" height="70" rx="8" fill="#ffffff" stroke="#dd6b20" stroke-width="2"/>
      <text x="20" y="30" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">README.md</text>
      <text x="20" y="55" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">版本记录、使用说明（推荐）</text>
    </g>
    <text x="30" y="360" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1a365d">SKILL.md 核心内容</text>
    <g transform="translate(30, 400)">
      <circle cx="15" cy="15" r="8" fill="#3182ce"/>
      <text x="40" y="20" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">触发规则：name, description, keywords</text>
    </g>
    <g transform="translate(30, 435)">
      <circle cx="15" cy="15" r="8" fill="#38b2ac"/>
      <text x="40" y="20" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">执行流程：步骤说明、工具调用</text>
    </g>
    <g transform="translate(30, 470)">
      <circle cx="15" cy="15" r="8" fill="#ed8936"/>
      <text x="40" y="20" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">输出规范：格式、路径、交付物</text>
    </g>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">25 / 38</text>
</svg>
