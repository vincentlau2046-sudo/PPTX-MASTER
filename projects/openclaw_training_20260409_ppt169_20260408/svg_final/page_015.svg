<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f7fafc"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">Cron 调度机制</text>
  <rect x="60" y="90" width="100" height="4" fill="#ed8936" rx="2"/>
  <!-- Cron Scheduler 框图 -->
  <rect x="340" y="130" width="600" height="380" rx="16" fill="#1a365d"/>
  <text x="640" y="165" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">Cron Scheduler</text>
  <!-- Job Queue -->
  <rect x="360" y="190" width="560" height="280" rx="12" fill="#0f2942"/>
  <text x="380" y="225" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ed8936">Job Queue (13 个任务)</text>
  <g transform="translate(380, 250)">
    <rect x="0" y="0" width="520" height="35" rx="4" fill="#3182ce"/>
    <text x="15" y="23" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#ffffff">国际形势日报 (工作日 8:00)</text>
  </g>
  <g transform="translate(380, 295)">
    <rect x="0" y="0" width="520" height="35" rx="4" fill="#38b2ac"/>
    <text x="15" y="23" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#ffffff">国际形势日报 PPT+视频 (8:30)</text>
  </g>
  <g transform="translate(380, 340)">
    <rect x="0" y="0" width="520" height="35" rx="4" fill="#ed8936"/>
    <text x="15" y="23" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#ffffff">国际形势周报 (周六 10:00)</text>
  </g>
  <g transform="translate(380, 385)">
    <rect x="0" y="0" width="520" height="35" rx="4" fill="#805ad5"/>
    <text x="15" y="23" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#ffffff">AI 情报日报 (每天 6:40)</text>
  </g>
  <g transform="translate(380, 430)">
    <rect x="0" y="0" width="520" height="35" rx="4" fill="#e53e3e"/>
    <text x="15" y="23" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#ffffff">质量监控日报 (每天 21:00)</text>
  </g>
  <text x="640" y="500" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">... 更多任务</text>
  <!-- 触发输出 -->
  <g transform="translate(160, 350)">
    <rect x="0" y="0" width="160" height="60" rx="8" fill="#3182ce"/>
    <text x="80" y="35" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">定时触发</text>
    <path d="M130 30 L160 30" stroke="#ed8936" stroke-width="3" fill="none"/>
  </g>
  <g transform="translate(960, 350)">
    <path d="M0 30 L30 30" stroke="#38b2ac" stroke-width="3" fill="none"/>
    <rect x="30" y="0" width="160" height="60" rx="8" fill="#38b2ac"/>
    <text x="110" y="35" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Session Target</text>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">15 / 38</text>
</svg>
