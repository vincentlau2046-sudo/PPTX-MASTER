    </text>
    
    <!-- Item 4 -->
    <rect x="80" y="400" width="1120" height="80" rx="8" fill="#F0F4F8" stroke="#5D6D7E" stroke-width="2"/>
    <text x="100" y="430" font-size="18" fill="#5D6D7E" font-weight="bold">
