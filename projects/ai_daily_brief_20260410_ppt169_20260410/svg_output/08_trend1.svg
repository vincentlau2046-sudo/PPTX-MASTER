<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CF002E"/>
      <stop offset="100%" stop-color="#8B0020"/>
    </linearGradient>
    <linearGradient id="trendGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0066CC"/>
      <stop offset="100%" stop-color="#CF002E"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- Header bar -->
  <rect x="0" y="0" width="1280" height="80" fill="#F8F9FA"/>
  <rect x="60" y="75" width="1160" height="5" fill="url(#headerGradient)"/>
  
  <!-- Page title -->
  <text x="60" y="50" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="35" font-weight="bold">
    趋势洞察：开源模型能力追平闭源
  </text>
  
  <!-- Left content -->
  <text x="60" y="140" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">
    核心观察
  </text>
  
  <rect x="60" y="160" width="540" height="140" fill="#FFF5F5" stroke="#CF002E" stroke-width="1" rx="8"/>
  <rect x="60" y="160" width="6" height="140" fill="#CF002E" rx="8"/>
  <text x="90" y="195" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold">
    性能追平
  </text>
  <text x="90" y="225" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17">
    Kimi K2.5、GLM-5.1 等国产开源模型在核心指标上
  </text>
  <text x="90" y="250" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17">
    已接近或超越 Claude、GPT 等闭源模型
  </text>
  <text x="90" y="285" fill="#CF002E" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold">
    从"低价获客"转向"价值定价"阶段
  </text>
  
  <rect x="60" y="320" width="540" height="100" fill="#F8F9FA" stroke="#E5E5E5" stroke-width="1" rx="8"/>
  <text x="90" y="355" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold">
    智谱逆势提价 10%
  </text>
  <text x="90" y="385" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">
    Coding 场景缓存 Token 价格接近 Claude Sonnet 4.6 水平
  </text>
  
  <!-- Right chart -->
  <text x="680" y="140" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">
    开源 vs 闭源 性能对比趋势
  </text>
  
  <rect x="680" y="160" width="520" height="260" fill="#F8F9FA" rx="8"/>
  
  <!-- Chart area -->
  <line x1="730" y1="380" x2="1150" y2="380" stroke="#999999" stroke-width="2"/>
  <line x1="730" y1="200" x2="730" y2="380" stroke="#999999" stroke-width="2"/>
  
  <!-- Closed source line (top, relatively flat) -->
  <polyline points="730,220 850,215 970,210 1090,205 1150,200" fill="none" stroke="#333333" stroke-width="3" stroke-dasharray="5,5"/>
  <circle cx="730" cy="220" r="6" fill="#333333"/>
  <circle cx="970" cy="210" r="6" fill="#333333"/>
  <circle cx="1150" cy="200" r="6" fill="#333333"/>
  <text x="1160" y="205" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">闭源模型</text>
  
  <!-- Open source line (rising) -->
  <polyline points="730,320 850,290 970,250 1090,220 1150,205" fill="none" stroke="url(#trendGradient)" stroke-width="3"/>
  <circle cx="730" cy="320" r="6" fill="#CF002E"/>
  <circle cx="970" cy="250" r="6" fill="#CF002E"/>
  <circle cx="1150" cy="205" r="6" fill="#CF002E"/>
  <text x="1160" y="210" fill="#CF002E" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold">开源模型</text>
  
  <!-- X-axis labels -->
  <text x="730" y="405" text-anchor="middle" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">2025 Q4</text>
  <text x="970" y="405" text-anchor="middle" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">2026 Q1</text>
  <text x="1150" y="405" text-anchor="middle" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">2026 Q2</text>
  
  <!-- Impact section -->
  <text x="60" y="490" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">
    后续影响
  </text>
  
  <rect x="60" y="515" width="360" height="120" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" rx="8"/>
  <text x="85" y="550" fill="#CF002E" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold">🏢 中小企业</text>
  <text x="85" y="575" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">可更低成本获得顶尖模型能力</text>
  <text x="85" y="600" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">需关注 API 价格波动风险</text>
  
  <rect x="460" y="515" width="360" height="120" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" rx="8"/>
  <text x="485" y="550" fill="#0066CC" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold">👨‍💻 从业者</text>
  <text x="485" y="575" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">模型选型从"选最贵"转向"选最适合"</text>
  <text x="485" y="600" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">多模型路由能力成为核心竞争力</text>
  
  <rect x="860" y="515" width="360" height="120" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" rx="8"/>
  <text x="885" y="550" fill="#00AA55" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold">📈 市场</text>
  <text x="885" y="575" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">2026 年 Q2 后，单纯靠低价获客的模型</text>
  <text x="885" y="600" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">将失去市场，需构建差异化能力</text>
  
  <!-- Footer -->
  <text x="1220" y="700" text-anchor="end" fill="#999999" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">
    2026-04-10 | 08
  </text>
</svg>
