  </text>
  <text x="490" y="235" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    • 调度 100 个专业分身
  </text>
  <text x="490" y="265" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    • 并行处理 1500 步骤
  </text>
  <text x="490" y="295" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
