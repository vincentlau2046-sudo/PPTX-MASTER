<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">OpenClaw 是什么？</text>
  <rect x="60" y="90" width="100" height="4" fill="#ed8936" rx="2"/>
  <text x="60" y="140" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="24" font-weight="bold" fill="#1a365d">AI Agent 操作系统</text>
  <text x="60" y="175" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" fill="#4a5568">让 AI 从"聊天机器人"变成"自主执行者"</text>
  <!-- 五大核心能力 -->
  <g transform="translate(80, 210)">
    <rect x="0" y="0" width="220" height="140" rx="12" fill="#ebf8ff" stroke="#3182ce" stroke-width="2"/>
    <text x="110" y="45" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" fill="#3182ce">💬</text>
    <text x="110" y="80" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">会话管理</text>
    <text x="110" y="110" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">主会话、子会话、隔离会话</text>
  </g>
  <g transform="translate(320, 210)">
    <rect x="0" y="0" width="220" height="140" rx="12" fill="#fef3e2" stroke="#ed8936" stroke-width="2"/>
    <text x="110" y="45" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" fill="#ed8936">⏰</text>
    <text x="110" y="80" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">任务调度</text>
    <text x="110" y="110" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">Cron 定时任务、Heartbeat</text>
  </g>
  <g transform="translate(560, 210)">
    <rect x="0" y="0" width="220" height="140" rx="12" fill="#e6fffa" stroke="#38b2ac" stroke-width="2"/>
    <text x="110" y="45" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" fill="#38b2ac">🛠️</text>
    <text x="110" y="80" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">技能系统</text>
    <text x="110" y="110" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">可扩展技能开发与执行</text>
  </g>
  <g transform="translate(800, 210)">
    <rect x="0" y="0" width="220" height="140" rx="12" fill="#faf5ff" stroke="#805ad5" stroke-width="2"/>
    <text x="110" y="45" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" fill="#805ad5">🤖</text>
    <text x="110" y="80" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">Multi-Agent</text>
    <text x="110" y="110" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">多 Agent 协同工作体系</text>
  </g>
  <g transform="translate(1040, 210)">
    <rect x="0" y="0" width="220" height="140" rx="12" fill="#fff5f5" stroke="#e53e3e" stroke-width="2"/>
    <text x="110" y="45" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" fill="#e53e3e">🧠</text>
    <text x="110" y="80" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">记忆系统</text>
    <text x="110" y="110" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">短期、长期、自我改进记忆</text>
  </g>
  <!-- 核心价值 -->
  <g transform="translate(80, 400)">
    <rect x="0" y="0" width="380" height="180" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="30" y="45" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1a365d">核心价值</text>
    <circle cx="50" cy="85" r="8" fill="#3182ce"/>
    <text x="70" y="92" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#4a5568">让 AI 自主执行任务</text>
    <circle cx="50" cy="125" r="8" fill="#38b2ac"/>
    <text x="70" y="132" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#4a5568">复杂任务自动化和持续化</text>
    <circle cx="50" cy="165" r="8" fill="#ed8936"/>
    <text x="70" y="172" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#4a5568">企业级任务监控和质量保障</text>
  </g>
  <g transform="translate(480, 400)">
    <rect x="0" y="0" width="380" height="180" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="30" y="45" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1a365d">核心配置</text>
    <circle cx="50" cy="85" r="8" fill="#805ad5"/>
    <text x="70" y="92" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#4a5568">配置文件: openclaw.json</text>
    <circle cx="50" cy="125" r="8" fill="#e53e3e"/>
    <text x="70" y="132" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#4a5568">工作空间: workspace/</text>
    <circle cx="50" cy="165" r="8" fill="#dd6b20"/>
    <text x="70" y="172" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#4a5568">技能目录: skills/</text>
  </g>
  <g transform="translate(880, 400)">
    <rect x="0" y="0" width="380" height="180" rx="12" fill="#1a365d"/>
    <text x="30" y="55" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">为什么选择 OpenClaw？</text>
    <text x="30" y="95" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#a0aec0">• 开源可定制</text>
    <text x="30" y="125" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#a0aec0">• 丰富的技能生态</text>
    <text x="30" y="155" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#a0aec0">• 强大的 Multi-Agent 能力</text>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">04 / 38</text>
</svg>
