<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f7fafc"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">执行流程时间线</text>
  <rect x="60" y="90" width="100" height="4" fill="#ed8936" rx="2"/>
  <!-- 时间线 -->
  <g transform="translate(100, 150)">
    <line x1="80" y1="30" x2="80" y2="400" stroke="#3182ce" stroke-width="4"/>
    <!-- 08:00 -->
    <circle cx="80" cy="30" r="15" fill="#3182ce"/>
    <text x="180" y="38" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">08:00 - Cron 触发</text>
    <text x="180" y="65" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">isolated session 启动</text>
    <!-- 08:00-08:02 -->
    <circle cx="80" cy="130" r="15" fill="#38b2ac"/>
    <text x="180" y="138" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">08:00-08:02 - Agent 执行</text>
    <text x="180" y="165" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">1. Tavily 搜索 7 个主题</text>
    <text x="180" y="190" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">2. 整理新闻</text>
    <text x="180" y="215" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">3. 生成 Markdown（1500-2000字）</text>
    <text x="180" y="240" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">4. 保存到指定路径</text>
    <text x="180" y="265" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">5. 发送飞书通知</text>
    <!-- 08:02 -->
    <circle cx="80" cy="330" r="15" fill="#ed8936"/>
    <text x="180" y="338" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">08:02 - 任务完成</text>
    <text x="180" y="365" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">耗时约 2 分钟</text>
    <!-- 08:02 推送 -->
    <circle cx="80" cy="430" r="15" fill="#e53e3e"/>
    <text x="180" y="438" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">08:02 - 飞书推送</text>
    <text x="180" y="465" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">🌍 国际形势日报 | 2026-04-09</text>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">21 / 38</text>
</svg>
