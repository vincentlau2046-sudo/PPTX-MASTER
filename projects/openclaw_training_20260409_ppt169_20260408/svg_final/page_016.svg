<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">HeartBeat 机制</text>
  <rect x="60" y="90" width="100" height="4" fill="#ed8936" rx="2"/>
  <!-- 定义框 -->
  <g transform="translate(100, 150)">
    <rect width="540" height="200" rx="12" fill="#ebf8ff" stroke="#3182ce" stroke-width="2"/>
    <text x="30" y="45" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1a365d">什么是 HeartBeat？</text>
    <text x="30" y="85" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#4a5568">定期唤醒主 Agent 检查系统状态</text>
    <g transform="translate(30, 120)">
      <circle cx="10" cy="10" r="6" fill="#ed8936"/>
      <text x="30" y="16" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">频率：默认每 5 分钟（可配置）</text>
    </g>
    <g transform="translate(30, 155)">
      <circle cx="10" cy="10" r="6" fill="#38b2ac"/>
      <text x="30" y="16" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">用途：系统巡检、批量检查、后台任务</text>
    </g>
  </g>
  <!-- 用途详解 -->
  <g transform="translate(660, 150)">
    <rect width="540" height="400" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="30" y="45" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#1a365d">主要用途</text>
    <g transform="translate(30, 80)">
      <rect x="0" y="0" width="480" height="60" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="20" y="28" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">📧 检查邮件</text>
      <text x="20" y="50" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">是否有紧急未读邮件</text>
    </g>
    <g transform="translate(30, 150)">
      <rect x="0" y="0" width="480" height="60" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="20" y="28" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">📅 检查日历</text>
      <text x="20" y="50" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">即将到来的日程（2小时内）</text>
    </g>
    <g transform="translate(30, 220)">
      <rect x="0" y="0" width="480" height="60" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="20" y="28" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">🔔 检查通知</text>
      <text x="20" y="50" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">社交媒体 @、提及、评论</text>
    </g>
    <g transform="translate(30, 290)">
      <rect x="0" y="0" width="480" height="60" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="20" y="28" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">🔄 系统巡检</text>
      <text x="20" y="50" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">周期性后台任务执行</text>
    </g>
    <g transform="translate(30, 360)">
      <rect x="0" y="0" width="480" height="60" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
      <text x="20" y="28" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">📝 记忆维护</text>
      <text x="20" y="50" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">定期整理 MEMORY.md</text>
    </g>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">16 / 38</text>
</svg>
