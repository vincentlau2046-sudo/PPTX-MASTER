<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">状态机规则</text>
  <rect x="60" y="90" width="100" height="4" fill="#ed8936" rx="2"/>
  <!-- 状态机图 -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="200" height="80" rx="12" fill="#e2e8f0" stroke="#718096" stroke-width="2"/>
    <text x="100" y="35" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">pending</text>
    <text x="100" y="60" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">等待启动</text>
  </g>
  <path d="M200 190 L300 190" stroke="#38b2ac" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="250" y="180" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#38b2ac">子Agent启动成功</text>
  <rect x="300" y="150" width="200" height="80" rx="12" fill="#ebf8ff" stroke="#3182ce" stroke-width="2"/>
  <text x="400" y="185" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">running</text>
  <path d="M500 190 L600 190" stroke="#ed8936" stroke-width="3" fill="none"/>
  <text x="550" y="180" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#ed8936">置信度≥90</text>
  <rect x="600" y="150" width="200" height="80" rx="12" fill="#c6f6d5" stroke="#38b2ac" stroke-width="2"/>
  <text x="700" y="185" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">success</text>
  <path d="M700 230 L700 330" stroke="#e53e3e" stroke-width="3" fill="none"/>
  <text x="720" y="290" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#e53e3e">置信度&lt;90</text>
  <rect x="600" y="330" width="200" height="80" rx="12" fill="#fed7d7" stroke="#e53e3e" stroke-width="2"/>
  <text x="700" y="365" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">failed</text>
  <path d="M400 230 L400 330" stroke="#e53e3e" stroke-width="3" fill="none"/>
  <text x="420" y="290" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#e53e3e">超时/错误</text>
  <rect x="300" y="330" width="200" height="80" rx="12" fill="#faf5ff" stroke="#805ad5" stroke-width="2"/>
  <text x="400" y="365" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#1a365d">review</text>
  <path d="M500 330 L600 330" stroke="#805ad5" stroke-width="3" fill="none"/>
  <text x="550" y="320" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#805ad5">审核通过</text>
  <!-- 右侧说明 -->
  <g transform="translate(900, 150)">
    <rect width="320" height="450" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="30" y="40" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">状态说明</text>
    <g transform="translate(30, 70)">
      <rect x="0" y="0" width="260" height="60" rx="6" fill="#e2e8f0"/>
      <text x="15" y="25" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#1a365d">pending</text>
      <text x="15" y="48" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#718096">任务刚创建</text>
    </g>
    <g transform="translate(30, 140)">
      <rect x="0" y="0" width="260" height="60" rx="6" fill="#ebf8ff"/>
      <text x="15" y="25" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#3182ce">running</text>
      <text x="15" y="48" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#718096">Agent 正在执行</text>
    </g>
    <g transform="translate(30, 210)">
      <rect x="0" y="0" width="260" height="60" rx="6" fill="#faf5ff"/>
      <text x="15" y="25" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#805ad5">review</text>
      <text x="15" y="48" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#718096">等待审核</text>
    </g>
    <g transform="translate(30, 280)">
      <rect x="0" y="0" width="260" height="60" rx="6" fill="#c6f6d5"/>
      <text x="15" y="25" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#276749">success</text>
      <text x="15" y="48" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#718096">任务完成</text>
    </g>
    <g transform="translate(30, 350)">
      <rect x="0" y="0" width="260" height="60" rx="6" fill="#fed7d7"/>
      <text x="15" y="25" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" fill="#c53030">failed</text>
      <text x="15" y="48" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#718096">任务失败</text>
    </g>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">35 / 38</text>
</svg>
