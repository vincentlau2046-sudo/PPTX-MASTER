  <path fill="#FFF9E6" stroke="#E74C3C" stroke-width="2" d="M88,100 H1192 A8,8 0 0 1 1200,108 V252 A8,8 0 0 1 1192,260 H88 A8,8 0 0 1 80,252 V108 A8,8 0 0 1 88,100 Z" />
