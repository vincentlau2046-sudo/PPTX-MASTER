<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f7fafc"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">任务监控架构</text>
  <rect x="60" y="90" width="100" height="4" fill="#ed8936" rx="2"/>
  <!-- 监控架构图 -->
  <g transform="translate(340, 140)">
    <rect x="0" y="0" width="600" height="100" rx="12" fill="#1a365d"/>
    <text x="300" y="55" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">任务调度器</text>
    <text x="300" y="85" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">每 5 分钟运行</text>
  </g>
  <path d="M640 190 L640 230" stroke="#3182ce" stroke-width="3" fill="none"/>
  <g transform="translate(340, 240)">
    <rect x="0" y="0" width="600" height="200" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="30" y="40" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">检查项</text>
    <g transform="translate(30, 65)">
      <circle cx="10" cy="10" r="6" fill="#e53e3e"/>
      <text x="30" y="15" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">超时任务扫描</text>
    </g>
    <g transform="translate(30, 95)">
      <circle cx="10" cy="10" r="6" fill="#38b2ac"/>
      <text x="30" y="15" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">子 Agent 状态同步</text>
    </g>
    <g transform="translate(30, 125)">
      <circle cx="10" cy="10" r="6" fill="#ed8936"/>
      <text x="30" y="15" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">Agent 负载状态更新</text>
    </g>
    <g transform="translate(30, 155)">
      <circle cx="10" cy="10" r="6" fill="#805ad5"/>
      <text x="30" y="15" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">审核轮次推进</text>
    </g>
    <g transform="translate(300, 65)">
      <circle cx="10" cy="10" r="6" fill="#3182ce"/>
      <text x="30" y="15" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">旧任务清理（30 天）</text>
    </g>
  </g>
  <path d="M640 440 L640 470" stroke="#38b2ac" stroke-width="3" fill="none"/>
  <g transform="translate(340, 480)">
    <rect x="0" y="0" width="600" height="150" rx="12" fill="#1a365d"/>
    <text x="30" y="40" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">状态更新</text>
    <g transform="translate(30, 70)">
      <rect x="0" y="0" width="160" height="60" rx="8" fill="#3182ce"/>
      <text x="80" y="35" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">task_status.md</text>
    </g>
    <g transform="translate(220, 70)">
      <rect x="0" y="0" width="160" height="60" rx="8" fill="#38b2ac"/>
      <text x="80" y="35" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">load_balance.json</text>
    </g>
    <g transform="translate(410, 70)">
      <rect x="0" y="0" width="160" height="60" rx="8" fill="#ed8936"/>
      <text x="80" y="35" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">fingerprints.json</text>
    </g>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">34 / 38</text>
</svg>
