    <text x="170" y="190">• 应用：具身智能、机器人、自动驾驶、游戏、影视</text>
    <text x="170" y="215">• 时间窗口：2026-2027 年是关键落地期</text>
  </g>
  <path fill="#28A745" d="M174,230 H266 A4,4 0 0 1 270,234 V246 A4,4 0 0 1 266,250 H174 A4,4 0 0 1 170,246 V234 A4,4 0 0 1 174,230 Z" />
