<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- Title -->
  <text x="80" y="80" font-family="Noto Sans SC Bold, sans-serif" font-size="36" fill="#1E293B">
    1.2 技术架构
  </text>
  
  <!-- Core Components Header -->
  <text x="80" y="160" font-family="Noto Sans SC Bold, sans-serif" font-size="28" fill="#1E293B">
    核心组件
  </text>
  
  <!-- Component list -->
  <text x="100" y="220" font-family="Noto Sans SC Bold, sans-serif" font-size="20" fill="#1E293B">
    Gateway
  </text>
  <text x="250" y="220" font-family="Noto Sans SC Regular, sans-serif" font-size="20" fill="#64748B">
    核心服务，管理所有组件
  </text>
  
  <text x="100" y="260" font-family="Noto Sans SC Bold, sans-serif" font-size="20" fill="#1E293B">
    Session Manager
  </text>
  <text x="250" y="260" font-family="Noto Sans SC Regular, sans-serif" font-size="20" fill="#64748B">
    会话生命周期管理
  </text>
  
  <text x="100" y="300" font-family="Noto Sans SC Bold, sans-serif" font-size="20" fill="#1E293B">
    Cron Scheduler
  </text>
  <text x="250" y="300" font-family="Noto Sans SC Regular, sans-serif" font-size="20" fill="#64748B">
    定时任务调度
  </text>
  
  <text x="100" y="340" font-family="Noto Sans SC Bold, sans-serif" font-size="20" fill="#1E293B">
    Skills Engine
  </text>
  <text x="250" y="340" font-family="Noto Sans SC Regular, sans-serif" font-size="20" fill="#64748B">
    技能加载和执行
  </text>
  
  <text x="100" y="380" font-family="Noto Sans SC Bold, sans-serif" font-size="20" fill="#1E293B">
    Memory System
  </text>
  <text x="250" y="380" font-family="Noto Sans SC Regular, sans-serif" font-size="20" fill="#64748B">
    记忆存储和检索
  </text>
  
  <text x="100" y="420" font-family="Noto Sans SC Bold, sans-serif" font-size="20" fill="#1E293B">
    Tools Proxy
  </text>
  <text x="250" y="420" font-family="Noto Sans SC Regular, sans-serif" font-size="20" fill="#64748B">
    工具调用代理
  </text>
  
  <!-- Architecture Diagram -->
  <rect x="600" y="200" width="500" height="300" fill="#F8FAFC" rx="10"/>
  <text x="850" y="240" font-family="Noto Sans SC Bold, sans-serif" font-size="20" fill="#1E293B" text-anchor="middle">
    架构层次
  </text>
  <text x="850" y="280" font-family="Noto Sans SC Regular, sans-serif" font-size="16" fill="#64748B" text-anchor="middle">
    Gateway → Agent → Tools → 外部系统
  </text>
  <text x="850" y="320" font-family="Noto Sans SC Regular, sans-serif" font-size="16" fill="#64748B" text-anchor="middle">
                  ↓
  </text>
  <text x="850" y="360" font-family="Noto Sans SC Regular, sans-serif" font-size="16" fill="#64748B" text-anchor="middle">
            结果返回 → 用户输出
  </text>
  
  <!-- Decorative line -->
  <line x1="80" y1="120" x2="400" y2="120" stroke="#2563EB" stroke-width="3"/>
</svg>