<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f7fafc"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">任务执行流程</text>
  <rect x="60" y="90" width="100" height="4" fill="#ed8936" rx="2"/>
  <!-- 流程图 -->
  <g transform="translate(80, 140)">
    <rect x="0" y="0" width="180" height="80" rx="8" fill="#3182ce"/>
    <text x="90" y="40" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">用户输入</text>
    <text x="90" y="65" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#bee3f8">深度分析中国MaaS市场</text>
  </g>
  <path d="M260 110 L300 110" stroke="#1a365d" stroke-width="2" fill="none"/>
  <rect x="300" y="70" width="180" height="80" rx="8" fill="#38b2ac"/>
  <text x="390" y="110" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">关键词匹配</text>
  <path d="M480 110 L520 110" stroke="#1a365d" stroke-width="2" fill="none"/>
  <rect x="520" y="70" width="180" height="80" rx="8" fill="#ed8936"/>
  <text x="610" y="110" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Agent 选择</text>
  <path d="M700 110 L740 110" stroke="#1a365d" stroke-width="2" fill="none"/>
  <rect x="740" y="70" width="180" height="80" rx="8" fill="#805ad5"/>
  <text x="830" y="110" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">启动子 Agent</text>
  <path d="M920 110 L960 110" stroke="#1a365d" stroke-width="2" fill="none"/>
  <rect x="960" y="70" width="180" height="80" rx="8" fill="#e53e3e"/>
  <text x="1050" y="110" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">状态跟踪</text>
  <path d="M1050 150 L1050 200" stroke="#1a365d" stroke-width="2" fill="none"/>
  <rect x="930" y="200" width="240" height="80" rx="8" fill="#dd6b20"/>
  <text x="1050" y="245" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">结果汇总</text>
  <path d="M930 240 L830 240" stroke="#1a365d" stroke-width="2" fill="none"/>
  <path d="M690 240 L610 240" stroke="#1a365d" stroke-width="2" fill="none"/>
  <rect x="430" y="320" width="420" height="120" rx="8" fill="#1a365d"/>
  <text x="640" y="355" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">sessions_spawn() 调用</text>
  <text x="640" y="390" text-anchor="middle" font-family="monospace" font-size="12" fill="#a0aec0">runtime="subagent"</text>
  <text x="640" y="415" text-anchor="middle" font-family="monospace" font-size="12" fill="#a0aec0">agent_id="tech_analyst"</text>
  <!-- 具体示例 -->
  <g transform="translate(100, 480)">
    <rect width="1080" height="180" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="30" y="40" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">实际执行示例</text>
    <rect x="30" y="70" width="1020" height="90" rx="8" fill="#ebf8ff"/>
    <text x="50" y="100" font-family="monospace" font-size="13" fill="#1a365d">// 主 Agent 调用子 Agent</text>
    <text x="50" y="125" font-family="monospace" font-size="13" fill="#3182ce">sessions_spawn(</text>
    <text x="70" y="150" font-family="monospace" font-size="13" fill="#38b2ac">runtime = "subagent",</text>
    <text x="70" y="170" font-family="monospace" font-size="13" fill="#38b2ac">agent_id = "tech_analyst",</text>
    <text x="70" y="190" font-family="monospace" font-size="13" fill="#38b2ac">task = "...", mode = "run"</text>
    <text x="270" y="190" font-family="monospace" font-size="13" fill="#ed8936">)</text>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">31 / 38</text>
</svg>
