<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CF002E"/>
      <stop offset="100%" stop-color="#8B0020"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- Header bar -->
  <rect x="0" y="0" width="1280" height="80" fill="#F8F9FA"/>
  <rect x="60" y="75" width="1160" height="5" fill="url(#headerGradient)"/>
  
  <!-- Page title -->
  <text x="60" y="50" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="35" font-weight="bold">
    核心摘要（30 秒速览）
  </text>
  
  <!-- Card 1 - Left -->
  <rect x="60" y="120" width="360" height="280" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" rx="8"/>
  <rect x="60" y="120" width="6" height="280" fill="#CF002E" rx="8"/>
  <text x="90" y="165" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">
    智谱 GLM-5.1 发布
  </text>
  <text x="90" y="205" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    • 全球首个 8 小时持续工作
  </text>
  <text x="90" y="235" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    • SWE-bench Pro 超越 Claude
  </text>
  <text x="90" y="265" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    • 8 小时构建 Linux 桌面
  </text>
  <text x="90" y="295" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    • 吞吐提升 6.9 倍
  </text>
  <text x="90" y="335" fill="#CF002E" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold">
    国产模型首次突破
  </text>
  
  <!-- Card 2 - Center -->
  <rect x="460" y="120" width="360" height="280" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" rx="8"/>
  <rect x="460" y="120" width="6" height="280" fill="#0066CC" rx="8"/>
  <text x="490" y="165" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">
    Kimi K2.5 登顶榜单
  </text>
  <text x="490" y="205" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
