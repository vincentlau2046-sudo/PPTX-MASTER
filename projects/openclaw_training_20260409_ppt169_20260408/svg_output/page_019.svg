<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">关键配置项</text>
  <rect x="60" y="90" width="100" height="4" fill="#ed8936" rx="2"/>
  <g transform="translate(60, 140)">
    <rect width="1160" height="500" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <rect width="1160" height="50" fill="#1a365d" rx="12"/>
    <text x="30" y="32" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">配置项</text>
    <text x="400" y="32" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">说明</text>
    <text x="800" y="32" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">示例</text>
    <g transform="translate(0, 70)">
      <rect width="1160" height="65" fill="#ebf8ff"/>
      <text x="30" y="38" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">schedule.kind</text>
      <text x="400" y="38" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">调度类型</text>
      <text x="800" y="38" text-anchor="middle" font-family="monospace" font-size="13" fill="#3182ce">cron / every / at</text>
    </g>
    <g transform="translate(0, 140)">
      <rect width="1160" height="65" fill="#ffffff"/>
      <text x="30" y="38" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">schedule.expr</text>
      <text x="400" y="38" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">Cron 表达式</text>
      <text x="800" y="38" text-anchor="middle" font-family="monospace" font-size="13" fill="#38b2ac">"0 8 * * 1-5"</text>
    </g>
    <g transform="translate(0, 210)">
      <rect width="1160" height="65" fill="#fef3e2"/>
      <text x="30" y="38" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">sessionTarget</text>
      <text x="400" y="38" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">执行会话</text>
      <text x="800" y="38" text-anchor="middle" font-family="monospace" font-size="13" fill="#ed8936">isolated / main</text>
    </g>
    <g transform="translate(0, 280)">
      <rect width="1160" height="65" fill="#ffffff"/>
      <text x="30" y="38" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">payload.kind</text>
      <text x="400" y="38" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">负载类型</text>
      <text x="800" y="38" text-anchor="middle" font-family="monospace" font-size="13" fill="#805ad5">agentTurn / systemEvent</text>
    </g>
    <g transform="translate(0, 350)">
      <rect width="1160" height="65" fill="#e6fffa"/>
      <text x="30" y="38" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">delivery.mode</text>
      <text x="400" y="38" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">交付方式</text>
      <text x="800" y="38" text-anchor="middle" font-family="monospace" font-size="13" fill="#e53e3e">announce / webhook</text>
    </g>
    <g transform="translate(0, 420)">
      <rect width="1160" height="65" fill="#fff5f5"/>
      <text x="30" y="38" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">timeoutSeconds</text>
      <text x="400" y="38" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">超时时间</text>
      <text x="800" y="38" text-anchor="middle" font-family="monospace" font-size="13" fill="#dd6b20">1800 (30分钟)</text>
    </g>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">19 / 38</text>
</svg>
