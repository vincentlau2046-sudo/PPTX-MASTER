<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">信息架构：数据流向</text>
  <rect x="60" y="90" width="120" height="4" fill="#ed8936" rx="2"/>
  <!-- 流程图 -->
  <g transform="translate(80, 180)">
    <!-- 用户输入 -->
    <rect x="0" y="80" width="160" height="80" rx="12" fill="#3182ce"/>
    <text x="80" y="125" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">用户输入</text>
    <text x="80" y="148" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#bee3f8">微信/飞书/Discord</text>
    <!-- 箭头 -->
    <path d="M170 120 L230 120" stroke="#1a365d" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <!-- Gateway -->
    <rect x="240" y="80" width="160" height="80" rx="12" fill="#1a365d"/>
    <text x="320" y="125" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Gateway</text>
    <text x="320" y="148" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#a0aec0">核心服务</text>
    <!-- 箭头 -->
    <path d="M410 120 L470 120" stroke="#1a365d" stroke-width="3" fill="none"/>
    <!-- Agent -->
    <rect x="480" y="80" width="160" height="80" rx="12" fill="#38b2ac"/>
    <text x="560" y="125" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Agent</text>
    <text x="560" y="148" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#b2f5ea">推理与决策</text>
    <!-- 箭头 -->
    <path d="M650 120 L710 120" stroke="#1a365d" stroke-width="3" fill="none"/>
    <!-- Tools -->
    <rect x="720" y="80" width="160" height="80" rx="12" fill="#ed8936"/>
    <text x="800" y="125" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Tools</text>
    <text x="800" y="148" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#feebc8">exec/feishu_doc</text>
    <!-- 箭头 -->
    <path d="M800 170 L800 260" stroke="#1a365d" stroke-width="3" fill="none"/>
    <!-- 外部系统 -->
    <rect x="720" y="320" width="160" height="80" rx="12" fill="#805ad5"/>
    <text x="800" y="365" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">外部系统</text>
    <text x="800" y="388" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#e9d8fd">GitHub/飞书/搜索</text>
    <!-- 返回路径 -->
    <path d="M720 360 L650 360" stroke="#1a365d" stroke-width="3" fill="none"/>
    <path d="M640 360 L560 360" stroke="#1a365d" stroke-width="3" fill="none"/>
    <path d="M480 360 L400 360" stroke="#1a365d" stroke-width="3" fill="none"/>
    <path d="M320 360 L320 200" stroke="#1a365d" stroke-width="3" fill="none"/>
    <path d="M230 200 L170 200" stroke="#1a365d" stroke-width="3" fill="none"/>
    <!-- 用户输出 -->
    <rect x="0" y="320" width="160" height="80" rx="12" fill="#e53e3e"/>
    <text x="80" y="365" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">用户输出</text>
    <text x="80" y="388" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#fed7d7">结果返回</text>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">07 / 38</text>
</svg>
