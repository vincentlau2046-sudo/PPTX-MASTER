<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#0a1628"/>
  
  <!-- Header -->
  <rect x="60" y="50" width="1160" height="60" fill="#1a2744" rx="12"/>
  <text x="100" y="90" font-family="Microsoft YaHei, Arial" font-size="36" font-weight="bold" fill="#3b82f6">区域要闻</text>
  
  <!-- Three columns -->
  <!-- Asia Pacific -->
  <rect x="60" y="140" width="360" height="440" fill="#1a2744" rx="12"/>
  <text x="240" y="180" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="24" font-weight="bold" fill="#3b82f6">🌏 亚太</text>
  <text x="80" y="220" font-family="Microsoft YaHei, Arial" font-size="16" fill="#e5e7eb">• 台海：两岸关系持续冰封</text>
  <text x="80" y="250" font-family="Microsoft YaHei, Arial" font-size="16" fill="#e5e7eb">• 朝鲜：战术突击手定位</text>
  <text x="80" y="280" font-family="Microsoft YaHei, Arial" font-size="16" fill="#e5e7eb">• 日韩：重启海上联合演习</text>
  <text x="80" y="310" font-family="Microsoft YaHei, Arial" font-size="16" fill="#e5e7eb">• 南海：无人集群跨域协同演习</text>
  
  <!-- Europe -->
  <rect x="460" y="140" width="360" height="440" fill="#1a2744" rx="12"/>
  <text x="640" y="180" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="24" font-weight="bold" fill="#3b82f6">🇪🇺 欧洲</text>
  <text x="480" y="220" font-family="Microsoft YaHei, Arial" font-size="16" fill="#e5e7eb">• 能源危机：或演变为财政危机</text>
  <text x="480" y="250" font-family="Microsoft YaHei, Arial" font-size="16" fill="#e5e7eb">• 欧盟政策：70% 欧洲制造遇阻</text>
  <text x="480" y="280" font-family="Microsoft YaHei, Arial" font-size="16" fill="#e5e7eb">• 左翼力量：经济困境中复兴</text>
  
  <!-- Middle East/Americas -->
  <rect x="860" y="140" width="360" height="440" fill="#1a2744" rx="12"/>
  <text x="1040" y="180" text-anchor="middle" font-family="Microsoft YaHei, Arial" font-size="24" font-weight="bold" fill="#3b82f6">🌎 中东/美洲</text>
  <text x="880" y="220" font-family="Microsoft YaHei, Arial" font-size="16" fill="#e5e7eb">• 伊朗：加大反击力度</text>
  <text x="880" y="250" font-family="Microsoft YaHei, Arial" font-size="16" fill="#e5e7eb">• 美国：特朗普对协议不乐观</text>
  <text x="880" y="280" font-family="Microsoft YaHei, Arial" font-size="16" fill="#e5e7eb">• OPEC+: 4 月起日增 20.6 万桶</text>
  
  <!-- Footer -->
  <text x="1200" y="650" text-anchor="end" font-family="Arial" font-size="14" fill="#9ca3af">4 / 8</text>
</svg>