    <!-- Item 1 -->
    <rect x="80" y="100" width="1120" height="80" rx="8" fill="#FFF9E6" stroke="#E74C3C" stroke-width="2"/>
    <text x="100" y="130" font-size="18" fill="#E74C3C" font-weight="bold">
      <tspan>🔴 腾讯混元 3.0 正式发布</tspan>
