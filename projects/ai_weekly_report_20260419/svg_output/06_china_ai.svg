<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- 中国厂商 AI 动态 -->
  
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect y="0" width="1280" height="8" fill="#005587"/>
  <rect x="0" y="0" width="8" height="720" fill="#005587"/>
  
  <!-- Title -->
  <text x="80" y="60" font-family="Arial" font-size="32" font-weight="bold" fill="#005587">
    <tspan>中国厂商 AI 动态</tspan>
  </text>
  <rect x="80" y="75" width="60" height="4" fill="#E74C3C"/>
  
  <!-- Card 1 - 火山引擎 -->
  <rect x="80" y="100" width="540" height="170" rx="8" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="1"/>
  <text x="100" y="130" font-family="Arial" font-size="18" fill="#E74C3C" font-weight="bold">
    <tspan>火山引擎 MaaS 市场份额 49.2%</tspan>
  </text>
  <g font-family="Arial" font-size="13" fill="#5D6D7E">
    <text x="100" y="160">• 豆包日均 Token 使用量突破 120 万亿</text>
    <text x="100" y="185">• 字节 2026 年资本支出预计 1600 亿元</text>
    <text x="100" y="210">• 登陆春晚展示技术实力</text>
  </g>
  <rect x="100" y="230" width="70" height="26" rx="4" fill="#28A745"/>
  <text x="135" y="250" text-anchor="middle" font-family="Arial" font-size="11" fill="#FFFFFF">中国第一</text>
  
  <!-- Card 2 - 阿里云 -->
  <rect x="660" y="100" width="540" height="170" rx="8" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="1"/>
  <text x="680" y="130" font-family="Arial" font-size="18" fill="#005587" font-weight="bold">
    <tspan>阿里云目标：拿下 AI 云市场增量 80%</tspan>
  </text>
  <g font-family="Arial" font-size="13" fill="#5D6D7E">
    <text x="680" y="160">• 未来三年面向 AI 投入 3800 亿元</text>
    <text x="680" y="185">• 通义千问全球下载量突破 6 亿次</text>
    <text x="680" y="210">• 成为全球第二大开源势力</text>
  </g>
  <rect x="680" y="230" width="70" height="26" rx="4" fill="#005587"/>
  <text x="715" y="250" text-anchor="middle" font-family="Arial" font-size="11" fill="#FFFFFF">全球第二</text>
  
  <!-- Card 3 - 月之暗面 -->
  <rect x="80" y="290" width="540" height="170" rx="8" fill="#FFF9E6" stroke="#E74C3C" stroke-width="2"/>
  <text x="100" y="320" font-family="Arial" font-size="18" fill="#E74C3C" font-weight="bold">
    <tspan>月之暗面冲刺港股 IPO</tspan>
  </text>
  <g font-family="Arial" font-size="13" fill="#5D6D7E">
    <text x="100" y="350">• 估值 180 亿美元</text>
    <text x="100" y="375">• Kimi K2.5 全球模型排名第八</text>
    <text x="100" y="400">• 海外 API 收入月度增长超 170%</text>
  </g>
  <rect x="100" y="420" width="80" height="26" rx="4" fill="#E74C3C"/>
  <text x="140" y="440" text-anchor="middle" font-family="Arial" font-size="11" fill="#FFFFFF">冲刺IPO</text>
  
  <!-- Card 4 - 阶跃星辰 -->
  <rect x="660" y="290" width="540" height="170" rx="8" fill="#E8F4F8" stroke="#005587" stroke-width="2"/>
  <text x="680" y="320" font-family="Arial" font-size="18" fill="#005587" font-weight="bold">
    <tspan>阶跃星辰拆除 VIE 架构</tspan>
  </text>
  <g font-family="Arial" font-size="13" fill="#5D6D7E">
    <text x="680" y="350">• 目标估值 100 亿美元</text>
    <text x="680" y="375">• 2025 年营收约 5 亿元</text>
    <text x="680" y="400">• 与 60% 头部品牌合作，装机量超 4200 万台</text>
  </g>
  <rect x="680" y="420" width="80" height="26" rx="4" fill="#005587"/>
  <text x="720" y="440" text-anchor="middle" font-family="Arial" font-size="11" fill="#FFFFFF">目标上市</text>
  
  <!-- IPO Race Box -->
  <rect x="80" y="480" width="1120" height="120" rx="8" fill="#F0F4F8" stroke="#5D6D7E" stroke-width="1"/>
  <text x="100" y="510" font-family="Arial" font-size="16" fill="#5D6D7E" font-weight="bold">
    <tspan>🇨🇳 中国大模型 IPO 竞速</tspan>
  </text>
  <g font-family="Arial" font-size="14" fill="#2C3E50">
    <text x="100" y="545">智谱上市市值 4227 亿港元 | MiniMax 上市市值 2983 亿港元</text>
    <text x="100" y="575">月之暗面（180亿估值）vs 阶跃星辰（100亿目标）→ "中国 AI 第三股"争夺</text>
  </g>
  
  <!-- Footer -->
  <text x="1200" y="680" text-anchor="end" font-family="Arial" font-size="14" fill="#7F8C8D">
    <tspan>6/15</tspan>
  </text>
</svg>
