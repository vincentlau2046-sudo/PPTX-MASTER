<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#ffffff"/>
  <!-- 顶部装饰 -->
  <rect width="1280" height="8" fill="url(#accentGrad)" xmlns:linearGradient="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#1a365d"/>
        <stop offset="50%" style="stop-color:#3182ce"/>
        <stop offset="100%" style="stop-color:#ed8936"/>
      </linearGradient>
    </defs>
  </rect>
  <!-- 页面标题 -->
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">培训目标</text>
  <rect x="60" y="90" width="80" height="4" fill="#ed8936" rx="2"/>
  <!-- 目标卡片 -->
  <g transform="translate(100, 150)">
    <rect width="340" height="200" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="60" cy="60" r="30" fill="#3182ce"/>
    <text x="60" y="68" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="32" fill="#ffffff">01</text>
    <text x="60" y="120" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#1a365d">掌握核心架构原理</text>
    <text x="60" y="155" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#4a5568">理解 OpenClaw 技术基础</text>
  </g>
  <g transform="translate(470, 150)">
    <rect width="340" height="200" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="60" cy="60" r="30" fill="#38b2ac"/>
    <text x="60" y="68" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="32" fill="#ffffff">02</text>
    <text x="60" y="120" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#1a365d">独立开发 Cron 任务</text>
    <text x="60" y="155" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#4a5568">掌握定时任务配置与调度</text>
  </g>
  <g transform="translate(840, 150)">
    <rect width="340" height="200" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="60" cy="60" r="30" fill="#ed8936"/>
    <text x="60" y="68" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="32" fill="#ffffff">03</text>
    <text x="60" y="120" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#1a365d">开发 OpenClaw 技能</text>
    <text x="60" y="155" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#4a5568">从需求分析到发布部署</text>
  </g>
  <g transform="translate(285, 380)">
    <rect width="340" height="200" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="60" cy="60" r="30" fill="#805ad5"/>
    <text x="60" y="68" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="32" fill="#ffffff">04</text>
    <text x="60" y="120" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#1a365d">构建 Multi-Agent 体系</text>
    <text x="60" y="155" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#4a5568">多Agent协同与任务调度</text>
  </g>
  <g transform="translate(655, 380)">
    <rect width="340" height="200" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <circle cx="60" cy="60" r="30" fill="#e53e3e"/>
    <text x="60" y="68" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="32" fill="#ffffff">05</text>
    <text x="60" y="120" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#1a365d">企业级任务监控</text>
    <text x="60" y="155" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#4a5568">质量保障与故障排查</text>
  </g>
  <!-- 页脚 -->
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">02 / 38</text>
</svg>
