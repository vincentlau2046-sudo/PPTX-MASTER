<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="1280" height="720" fill="#F5F5F5"/>
  
  <!-- 底部灰色条 -->
  <rect x="0" y="680" width="1280" height="40" fill="#E0E0E0"/>
  <text x="80" y="705" font-family="思源黑体, Arial, sans-serif" font-size="14" fill="#666666">{{COPYRIGHT}}</text>
  <text x="1200" y="705" font-family="思源黑体, Arial, sans-serif" font-size="14" fill="#666666" text-anchor="end">{{LOGO}}</text>
  
  <!-- 左上角红色竖条 -->
  <rect x="0" y="0" width="5" height="50" fill="#D9001B"/>
  
  <!-- 标题 -->
  <text x="80" y="105" font-family="思源黑体, Arial, sans-serif" font-size="32" font-weight="bold" fill="#333333">CONTENTS</text>
  
  <!-- 目录项1 -->
  <rect x="80" y="180" width="800" height="80" fill="#FFFFFF" stroke="#EEEEEE"/>
  <rect x="80" y="180" width="80" height="80" fill="#D9001B"/>
  <text x="120" y="230" font-family="思源黑体, Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">01</text>
  <text x="180" y="230" font-family="思源黑体, Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="start">{{TOC_ITEM_1_TITLE}}</text>
  
  <!-- 目录项2 -->
  <rect x="80" y="280" width="800" height="80" fill="#FFFFFF" stroke="#EEEEEE"/>
  <rect x="80" y="280" width="80" height="80" fill="#D9001B"/>
  <text x="120" y="330" font-family="思源黑体, Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">02</text>
  <text x="180" y="330" font-family="思源黑体, Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="start">{{TOC_ITEM_2_TITLE}}</text>
  
  <!-- 目录项3 -->
  <rect x="80" y="380" width="800" height="80" fill="#FFFFFF" stroke="#EEEEEE"/>
  <rect x="80" y="380" width="80" height="80" fill="#D9001B"/>
  <text x="120" y="430" font-family="思源黑体, Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">03</text>
  <text x="180" y="430" font-family="思源黑体, Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="start">{{TOC_ITEM_3_TITLE}}</text>
  
  <!-- 目录项4 -->
  <rect x="80" y="480" width="800" height="80" fill="#FFFFFF" stroke="#EEEEEE"/>
  <rect x="80" y="480" width="80" height="80" fill="#D9001B"/>
  <text x="120" y="530" font-family="思源黑体, Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">04</text>
  <text x="180" y="530" font-family="思源黑体, Arial, sans-serif" font-size="22" font-weight="bold" fill="#333333" text-anchor="start">{{TOC_ITEM_4_TITLE}}</text>
</svg>
