<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- 大模型动态 -->
  
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect y="0" width="1280" height="8" fill="#005587"/>
  <rect x="0" y="0" width="8" height="720" fill="#005587"/>
  
  <!-- Title -->
  <text x="80" y="60" font-family="Arial" font-size="32" font-weight="bold" fill="#005587">
    <tspan>大模型动态</tspan>
  </text>
  <rect x="80" y="75" width="60" height="4" fill="#E74C3C"/>
  
  <!-- Card 1 - 智谱 -->
  <rect x="80" y="100" width="540" height="200" rx="8" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="1"/>
  <rect x="80" y="100" width="8" height="200" fill="#E74C3C"/>
  <text x="100" y="130" font-family="Arial" font-size="18" fill="#E74C3C" font-weight="bold">
    <tspan>智谱 GLM-5.1 开源</tspan>
  </text>
  <g font-family="Arial" font-size="14" fill="#5D6D7E">
    <text x="100" y="160">• 全球首个 8 小时持续工作能力开源模型</text>
    <text x="100" y="185">• SWE-bench Pro 超越 Claude Opus 4.6</text>
    <text x="100" y="210">• Coding 场景价格接近 Claude Sonnet 4.6</text>
    <text x="100" y="235">• OpenRouter 监测显示全线提价 10%</text>
  </g>
  <rect x="100" y="260" width="80" height="28" rx="4" fill="#28A745"/>
  <text x="140" y="280" text-anchor="middle" font-family="Arial" font-size="12" fill="#FFFFFF">国产领先</text>
  
  <!-- Card 2 - 微软 -->
  <rect x="660" y="100" width="540" height="200" rx="8" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="1"/>
  <rect x="660" y="100" width="8" height="200" fill="#005587"/>
  <text x="680" y="130" font-family="Arial" font-size="18" fill="#005587" font-weight="bold">
    <tspan>微软发布 3 款自研基础模型</tspan>
  </text>
  <g font-family="Arial" font-size="14" fill="#5D6D7E">
    <text x="680" y="160">• MAI-Transcribe-1（语音转写）</text>
    <text x="680" y="185">• MAI-Voice-1（语音生成）$22/百万字符</text>
    <text x="680" y="210">• MAI-Image-2（图像生成）$5/百万Token</text>
    <text x="680" y="235">• Microsoft AI CEO 表示要实现"AI 自给自足"</text>
  </g>
  <rect x="680" y="260" width="80" height="28" rx="4" fill="#E74C3C"/>
  <text x="720" y="280" text-anchor="middle" font-family="Arial" font-size="12" fill="#FFFFFF">与 OpenAI 竞争</text>
  
  <!-- Card 3 - OpenAI/Anthropic -->
  <rect x="80" y="320" width="1120" height="180" rx="8" fill="#E8F4F8" stroke="#005587" stroke-width="2"/>
  <text x="100" y="350" font-family="Arial" font-size="18" fill="#005587" font-weight="bold">
    <tspan>OpenAI 发布 GPT-5.4，Anthropic 发布 Claude Opus 4.7</tspan>
  </text>
  <g font-family="Arial" font-size="14" fill="#5D6D7E">
    <text x="100" y="385">• 同日发布新模型，模型大战持续升级</text>
    <text x="100" y="415">• GPT-5.4 复杂推理能力提升</text>
    <text x="100" y="445">• Claude Opus 4.7 引入安全机制自动检测高风险请求</text>
  </g>
  
  <!-- Info Box -->
  <rect x="80" y="520" width="1120" height="100" rx="8" fill="#FFF9E6" stroke="#E74C3C" stroke-width="1"/>
  <text x="100" y="550" font-family="Arial" font-size="14" fill="#E74C3C" font-weight="bold">
    <tspan>🧠 模型大战升级：从参数竞赛转向能力竞争</tspan>
  </text>
  <text x="100" y="580" font-family="Arial" font-size="14" fill="#5D6D7E">
    <tspan>国产模型首次在真实工程任务中验证持续工作能力，价格对齐国际头部</tspan>
  </text>
  
  <!-- Footer -->
  <text x="1200" y="680" text-anchor="end" font-family="Arial" font-size="14" fill="#7F8C8D">
    <tspan>5/15</tspan>
  </text>
</svg>
