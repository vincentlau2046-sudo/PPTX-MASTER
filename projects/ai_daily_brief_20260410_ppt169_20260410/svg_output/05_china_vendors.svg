<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CF002E"/>
      <stop offset="100%" stop-color="#8B0020"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- Header bar -->
  <rect x="0" y="0" width="1280" height="80" fill="#F8F9FA"/>
  <rect x="60" y="75" width="1160" height="5" fill="url(#headerGradient)"/>
  
  <!-- Page title -->
  <text x="60" y="50" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="35" font-weight="bold">
    中国厂商 AI 动态
  </text>
  
  <!-- Card 1: 阿里云 CodingPlan -->
  <rect x="60" y="120" width="360" height="260" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" rx="8"/>
  <rect x="60" y="120" width="8" height="260" fill="#CF002E" rx="8"/>
  <text x="95" y="165" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">
    阿里云 CodingPlan
  </text>
  <text x="95" y="200" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    • 四大开源模型自由切换
  </text>
  <text x="95" y="225" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
