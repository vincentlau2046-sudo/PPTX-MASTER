<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">HeartBeat vs Cron 对比</text>
  <rect x="60" y="90" width="100" height="4" fill="#ed8936" rx="2"/>
  <!-- 对比表格 -->
  <g transform="translate(100, 140)">
    <rect width="1080" height="480" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <rect width="1080" height="60" fill="#1a365d" rx="12"/>
    <text x="200" y="38" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">特性</text>
    <text x="640" y="38" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">HeartBeat</text>
    <text x="900" y="38" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">Cron</text>
    <!-- 行1 -->
    <rect y="60" width="1080" height="80" fill="#ebf8ff"/>
    <text x="200" y="105" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#1a365d">触发方式</text>
    <text x="640" y="105" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">固定间隔（如 5 分钟）</text>
    <text x="900" y="105" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">Cron 表达式（精确时间）</text>
    <!-- 行2 -->
    <rect y="140" width="1080" height="80" fill="#ffffff"/>
    <text x="200" y="185" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#1a365d">执行会话</text>
    <text x="640" y="185" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">主会话</text>
    <text x="900" y="185" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">可选主会话/隔离会话</text>
    <!-- 行3 -->
    <rect y="220" width="1080" height="80" fill="#fef3e2"/>
    <text x="200" y="265" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#1a365d">主要用途</text>
    <text x="640" y="265" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">系统巡检、批量检查</text>
    <text x="900" y="265" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#4a5568">定时任务、日报周报</text>
    <!-- 行4 -->
    <rect y="300" width="1080" height="80" fill="#ffffff"/>
    <text x="200" y="345" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#1a365d">配置复杂度</text>
    <text x="640" y="345" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#38b2ac" font-weight="bold">低</text>
    <text x="900" y="345" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#ed8936" font-weight="bold">中</text>
    <!-- 行5 -->
    <rect y="380" width="1080" height="80" fill="#e6fffa"/>
    <text x="200" y="425" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#1a365d">适用场景</text>
    <text x="640" y="410" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">• 邮件/日历检查</text>
    <text x="640" y="435" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">• 通知监控</text>
    <text x="900" y="410" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">• 每日简报生成</text>
    <text x="900" y="435" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">• 定时数据同步</text>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">17 / 38</text>
</svg>
