  </text>
  <rect x="895" y="285" width="295" height="60" fill="#F0FFF5" stroke="#00AA55" stroke-width="1" rx="6"/>
  <text x="910" y="310" fill="#00AA55" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold">
