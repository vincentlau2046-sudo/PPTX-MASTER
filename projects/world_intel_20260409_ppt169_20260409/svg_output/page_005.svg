<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="0" y="0" width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="60" font-family="Noto Sans CJK SC, sans-serif" font-size="16" fill="#718096">国际形势日报 | 2026-04-09</text>
  <text x="60" y="100" font-family="Noto Sans CJK SC, sans-serif" font-size="32" font-weight="bold" fill="#1a365d">全球市场</text>
  <rect x="60" y="115" width="100" height="4" fill="#ed8936" rx="2"/>
  <text x="60" y="145" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#718096">截至 4 月 8 日收盘</text>
  <!-- 油价 -->
  <rect x="60" y="170" width="280" height="160" rx="8" fill="#fff5f5" stroke="#fc8181"/>
  <text x="80" y="200" font-family="Noto Sans CJK SC, sans-serif" font-size="18" font-weight="bold" fill="#c53030">🛢️ 油价</text>
  <text x="80" y="235" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#2d3748">布伦特原油</text>
  <text x="80" y="260" font-family="Noto Sans CJK SC, sans-serif" font-size="24" font-weight="bold" fill="#1a365d">$109.18</text>
  <text x="200" y="260" font-family="Noto Sans CJK SC, sans-serif" font-size="16" fill="#38a169">+7.93%</text>
  <text x="80" y="290" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#2d3748">WTI 原油</text>
  <text x="80" y="315" font-family="Noto Sans CJK SC, sans-serif" font-size="20" font-weight="bold" fill="#1a365d">$109.79</text>
  <text x="180" y="315" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#38a169">+9.66%</text>
  <!-- 金价 -->
  <rect x="360" y="170" width="280" height="160" rx="8" fill="#faf5ff" stroke="#b794f4"/>
  <text x="380" y="200" font-family="Noto Sans CJK SC, sans-serif" font-size="18" font-weight="bold" fill="#6b46c1">🥇 金价</text>
  <text x="380" y="235" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#2d3748">现货黄金</text>
  <text x="380" y="265" font-family="Noto Sans CJK SC, sans-serif" font-size="24" font-weight="bold" fill="#1a365d">$4,627</text>
  <text x="500" y="265" font-family="Noto Sans CJK SC, sans-serif" font-size="16" fill="#e53e3e">-3.0%</text>
  <text x="380" y="300" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#718096">中国黄金储备连续17个月增加</text>
  <!-- 股指 -->
  <rect x="660" y="170" width="280" height="160" rx="8" fill="#f0fff4" fill-opacity="0.5" stroke="#68d391"/>
  <text x="680" y="200" font-family="Noto Sans CJK SC, sans-serif" font-size="18" font-weight="bold" fill="#276749">📈 股指</text>
  <text x="680" y="235" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#2d3748">标普 500 期货</text>
  <text x="680" y="260" font-family="Noto Sans CJK SC, sans-serif" font-size="20" font-weight="bold" fill="#1a365d">6,599</text>
  <text x="780" y="260" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#e53e3e">-0.3%</text>
  <text x="680" y="285" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#2d3748">纳斯达克 100 期货</text>
  <text x="680" y="310" font-family="Noto Sans CJK SC, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">24,119</text>
  <text x="820" y="310" font-family="Noto Sans CJK SC, sans-serif" font-size="12" fill="#e53e3e">-0.4%</text>
  <!-- 汇率 -->
  <rect x="960" y="170" width="260" height="160" rx="8" fill="#ebf8ff" stroke="#63b3ed"/>
  <text x="980" y="200" font-family="Noto Sans CJK SC, sans-serif" font-size="18" font-weight="bold" fill="#2b6cb0">💱 汇率</text>
  <text x="980" y="235" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#2d3748">欧元/美元</text>
  <text x="980" y="260" font-family="Noto Sans CJK SC, sans-serif" font-size="20" font-weight="bold" fill="#1a365d">1.1534</text>
  <text x="1090" y="260" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#e53e3e">-0.12%</text>
  <text x="980" y="285" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#2d3748">美元/日元</text>
  <text x="980" y="310" font-family="Noto Sans CJK SC, sans-serif" font-size="20" font-weight="bold" fill="#1a365d">159.57</text>
  <text x="1090" y="310" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#718096">-</text>
  <!-- 市场点评 -->
  <rect x="60" y="360" width="1160" height="1" fill="#e2e8f0"/>
  <text x="60" y="390" font-family="Noto Sans CJK SC, sans-serif" font-size="18" font-weight="bold" fill="#1a365d">市场点评</text>
  <text x="60" y="420" font-family="Noto Sans CJK SC, sans-serif" font-size="16" fill="#2d3748">• 美伊停火谈判进展缓解能源供应担忧，油价从高位回落</text>
  <text x="60" y="445" font-family="Noto Sans CJK SC, sans-serif" font-size="16" fill="#2d3748">• 黄金避险需求减弱，价格小幅回调</text>
  <text x="60" y="470" font-family="Noto Sans CJK SC, sans-serif" font-size="16" fill="#2d3748">• 美联储降息预期降温，市场预计今年降息50个基点</text>
  <text x="60" y="510" font-family="Noto Sans CJK SC, sans-serif" font-size="14" fill="#718096">数据来源：AASTOCKS | BCR</text>
</svg>