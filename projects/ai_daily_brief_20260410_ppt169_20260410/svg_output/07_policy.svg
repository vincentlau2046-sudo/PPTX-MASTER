<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CF002E"/>
      <stop offset="100%" stop-color="#8B0020"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- Header bar -->
  <rect x="0" y="0" width="1280" height="80" fill="#F8F9FA"/>
  <rect x="60" y="75" width="1160" height="5" fill="url(#headerGradient)"/>
  
  <!-- Page title -->
  <text x="60" y="50" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="35" font-weight="bold">
    AI 政策与监管
  </text>
  
  <!-- Main timeline -->
  <rect x="60" y="120" width="1160" height="280" fill="#F8F9FA" rx="8"/>
  
  <!-- Timeline header -->
  <text x="640" y="165" text-anchor="middle" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" font-weight="bold">
    欧盟 AI 法案时间线
  </text>
  
  <!-- Timeline axis -->
  <line x1="120" y1="220" x2="1160" y2="220" stroke="#CF002E" stroke-width="3"/>
  
  <!-- Point 1: 2024.08 生效 -->
  <circle cx="320" cy="220" r="12" fill="#CF002E"/>
  <rect x="270" y="250" width="100" height="80" fill="#FFFFFF" stroke="#CF002E" stroke-width="2" rx="6"/>
  <text x="320" y="275" text-anchor="middle" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold">2024.08.01</text>
  <text x="320" y="300" text-anchor="middle" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">正式生效</text>
  <polygon points="320,250 315,260 325,260" fill="#CF002E"/>
  
  <!-- Point 2: 2026.08 适用 -->
  <circle cx="960" cy="220" r="12" fill="#CF002E"/>
  <rect x="910" y="250" width="100" height="80" fill="#FFFFFF" stroke="#CF002E" stroke-width="2" rx="6"/>
  <text x="960" y="275" text-anchor="middle" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold">2026.08.02</text>
  <text x="960" y="300" text-anchor="middle" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">大部分条款适用</text>
  <polygon points="960,250 955,260 965,260" fill="#CF002E"/>
  
  <!-- Current position marker -->
  <rect x="620" y="190" width="40" height="60" fill="#CF002E" rx="4"/>
  <text x="640" y="230" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12" font-weight="bold">当前</text>
  <polygon points="640,250 635,260 645,260" fill="#CF002E"/>
  
  <!-- Key points -->
  <text x="60" y="450" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">
    监管重点
  </text>
  
  <rect x="60" y="475" width="540" height="100" fill="#FFF5F5" stroke="#CF002E" stroke-width="1" rx="8"/>
  <rect x="60" y="475" width="6" height="100" fill="#CF002E" rx="8"/>
  <text x="90" y="510" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold">
    高风险 AI 应用监管
  </text>
  <text x="90" y="540" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">
    鉴于"某些应用人工智能的方式可能引发不可接受的风险"
  </text>
  <text x="90" y="565" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">
    欧盟加强对高风险 AI 应用的监管
  </text>
  
  <rect x="680" y="475" width="540" height="100" fill="#F8F9FA" stroke="#E5E5E5" stroke-width="1" rx="8"/>
  <rect x="680" y="475" width="6" height="100" fill="#0066CC" rx="8"/>
  <text x="710" y="510" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18" font-weight="bold">
    全球首部综合性立法
  </text>
  <text x="710" y="540" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">
    作为全球首部全面规范人工智能技术的综合性立法
  </text>
  <text x="710" y="565" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">
    为各国 AI 监管提供参照
  </text>
  
  <!-- Additional info -->
  <rect x="60" y="600" width="1160" height="60" fill="#F0F7FF" stroke="#0066CC" stroke-width="1" rx="6"/>
  <text x="90" y="635" fill="#0066CC" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold">
    📋 补充：欧盟发布《通用人工智能行为准则》，补充 AI 法案框架
  </text>
  
  <!-- Footer -->
  <text x="1220" y="700" text-anchor="end" fill="#999999" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">
    2026-04-10 | 07
  </text>
</svg>
