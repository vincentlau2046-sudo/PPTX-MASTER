<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <!-- 趋势洞察 Page 2 + 机会矩阵 -->
  
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect y="0" width="1280" height="8" fill="#005587"/>
  <rect x="0" y="0" width="8" height="720" fill="#005587"/>
  
  <!-- Trend 4 -->
  <text x="80" y="60" font-family="Arial" font-size="28" font-weight="bold" fill="#005587">
    <tspan>趋势 4：算力价格回归理性</tspan>
  </text>
  <rect x="80" y="75" width="60" height="4" fill="#E74C3C"/>
  
  <rect x="80" y="100" width="540" height="150" rx="8" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="1"/>
  <text x="100" y="130" font-family="Arial" font-size="16" fill="#005587" font-weight="bold">
    <tspan>云厂商价格调整</tspan>
  </text>
  <g font-family="Arial" font-size="14" fill="#5D6D7E">
    <text x="100" y="160">• 阿里云上调 2-7%</text>
    <text x="100" y="185">• 腾讯云上调 5%</text>
    <text x="100" y="210">• 中国日均 Token 调用量突破 140 万亿</text>
  </g>
  
  <rect x="660" y="100" width="540" height="150" rx="8" fill="#E8F4F8" stroke="#005587" stroke-width="1"/>
  <text x="680" y="130" font-family="Arial" font-size="16" fill="#005587" font-weight="bold">
    <tspan>定价逻辑转变</tspan>
  </text>
  <g font-family="Arial" font-size="14" fill="#5D6D7E">
    <text x="680" y="160">• 从"硬件成本"转向"商业价值"</text>
    <text x="680" y="185">• 从"白菜价补贴"转向"价值回归"</text>
    <text x="680" y="210">• 全栈能力成为竞争核心</text>
  </g>
  
  <!-- Opportunity Matrix -->
  <text x="80" y="290" font-family="Arial" font-size="28" font-weight="bold" fill="#005587">
    <tspan>机会矩阵</tspan>
  </text>
  <rect x="80" y="305" width="60" height="4" fill="#E74C3C"/>
  
  <!-- Matrix Table -->
  <g font-family="Arial" font-size="13">
    <!-- Header -->
    <rect x="80" y="330" width="1120" height="40" fill="#005587"/>
    <text x="180" y="355" text-anchor="middle" fill="#FFFFFF" font-weight="bold">领域</text>
    <text x="350" y="355" text-anchor="middle" fill="#FFFFFF" font-weight="bold">热度</text>
    <text x="520" y="355" text-anchor="middle" fill="#FFFFFF" font-weight="bold">成熟度</text>
    <text x="720" y="355" text-anchor="middle" fill="#FFFFFF" font-weight="bold">机会窗口</text>
    <text x="920" y="355" text-anchor="middle" fill="#FFFFFF" font-weight="bold">优先级</text>
    
    <!-- Row 1 -->
    <rect x="80" y="370" width="1120" height="45" fill="#FFFFFF" stroke="#DEE2E6" stroke-width="1"/>
    <text x="180" y="398" text-anchor="middle" fill="#2C3E50">世界模型</text>
    <text x="350" y="398" text-anchor="middle" fill="#E74C3C">🔴🔥🔥🔥🔥</text>
    <text x="520" y="398" text-anchor="middle" fill="#5D6D7E">🟡 中</text>
    <text x="720" y="398" text-anchor="middle" fill="#2C3E50">1-3 年</text>
    <rect x="870" y="380" width="100" height="26" rx="4" fill="#E74C3C"/>
    <text x="920" y="398" text-anchor="middle" fill="#FFFFFF" font-size="12">🔴 高</text>
    
    <!-- Row 2 -->
    <rect x="80" y="415" width="1120" height="45" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="1"/>
    <text x="180" y="443" text-anchor="middle" fill="#2C3E50">大模型 IPO</text>
    <text x="350" y="443" text-anchor="middle" fill="#E74C3C">🔴🔥🔥🔥</text>
    <text x="520" y="443" text-anchor="middle" fill="#28A745">🔴 高</text>
    <text x="720" y="443" text-anchor="middle" fill="#2C3E50">6-12 月</text>
    <rect x="870" y="425" width="100" height="26" rx="4" fill="#E74C3C"/>
    <text x="920" y="443" text-anchor="middle" fill="#FFFFFF" font-size="12">🔴 高</text>
    
    <!-- Row 3 -->
    <rect x="80" y="460" width="1120" height="45" fill="#FFFFFF" stroke="#DEE2E6" stroke-width="1"/>
    <text x="180" y="488" text-anchor="middle" fill="#2C3E50">AI 云服务</text>
    <text x="350" y="488" text-anchor="middle" fill="#E74C3C">🔴🔥🔥🔥</text>
    <text x="520" y="488" text-anchor="middle" fill="#28A745">🔴 高</text>
    <text x="720" y="488" text-anchor="middle" fill="#2C3E50">立即</text>
    <rect x="870" y="470" width="100" height="26" rx="4" fill="#E74C3C"/>
    <text x="920" y="488" text-anchor="middle" fill="#FFFFFF" font-size="12">🔴 高</text>
    
    <!-- Row 4 -->
    <rect x="80" y="505" width="1120" height="45" fill="#F8F9FA" stroke="#DEE2E6" stroke-width="1"/>
    <text x="180" y="533" text-anchor="middle" fill="#2C3E50">Agent 商业化</text>
    <text x="350" y="533" text-anchor="middle" fill="#E74C3C">🔴🔥🔥🔥</text>
    <text x="520" y="533" text-anchor="middle" fill="#5D6D7E">🟡 中</text>
    <text x="720" y="533" text-anchor="middle" fill="#2C3E50">3-6 月</text>
    <rect x="870" y="515" width="100" height="26" rx="4" fill="#E74C3C"/>
    <text x="920" y="533" text-anchor="middle" fill="#FFFFFF" font-size="12">🔴 高</text>
  </g>
  
  <!-- Footer -->
  <text x="1200" y="680" text-anchor="end" font-family="Arial" font-size="14" fill="#7F8C8D">
    <tspan>10/15</tspan>
  </text>
</svg>
