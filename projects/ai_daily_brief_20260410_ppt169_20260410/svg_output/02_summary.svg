  </text>
  <text x="890" y="235" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    • 全球首个通用智能体
  </text>
  <text x="890" y="265" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
