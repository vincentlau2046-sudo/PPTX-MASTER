  </text>
  <text x="495" y="225" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    • 周调用量 3.07T tokens
  </text>
  <text x="495" y="250" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    • 超 Kimi+GLM+DeepSeek 总和
  </text>
  <rect x="495" y="285" width="295" height="60" fill="#F0F7FF" stroke="#0066CC" stroke-width="1" rx="6"/>
  <text x="510" y="310" fill="#0066CC" font-family="Arial, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold">
    📈 带动 100K-1M 长文本调用
  </text>
  <text x="510" y="335" fill="#999999" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">
    Agent 工作流典型消耗场景
  </text>
  
  <!-- Card 3: 腾讯混元 -->
  <rect x="860" y="120" width="360" height="260" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" rx="8"/>
  <rect x="860" y="120" width="8" height="260" fill="#00AA55" rx="8"/>
  <text x="895" y="165" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">
