  <text x="60" y="90" font-family="Microsoft YaHei, Arial" font-size="18" fill="#1A1A1A">1. **推理成本下降 10 倍**：NVIDIA Rubin + 模型优化双重驱动，AI 应用经济性拐点已至</text>
  
  <text x="60" y="140" font-family="Microsoft YaHei, Arial" font-size="18" fill="#1A1A1A">2. **Agent 生态标准化**：MCP + A2A 协议形成事实标准，多 Agent 协作进入生产阶段</text>
  
  <text x="60" y="190" font-family="Microsoft YaHei, Arial" font-size="18" fill="#1A1A1A">3. **中国 AI 应用爆发**：豆包破亿、千问 3000 万，AI 从&quot;尝鲜&quot;转向&quot;日常&quot;</text>
  
  <text x="60" y="240" font-family="Microsoft YaHei, Arial" font-size="18" fill="#1A1A1A">4. **ROI 成为核心议题**：95% 试点失败倒逼企业聚焦可验证价值</text>
  
  <text x="60" y="290" font-family="Microsoft YaHei, Arial" font-size="18" fill="#1A1A1A">1. **&quot;AGI  imminent&quot;论调**：模型性能趋同但仍未突破根本瓶颈</text>
  
  <text x="60" y="340" font-family="Microsoft YaHei, Arial" font-size="18" fill="#1A1A1A">2. **&quot;AI 将取代所有工作&quot;**：2026 年主题是&quot;增强&quot;而非&quot;替代&quot;</text>
  
  <text x="60" y="390" font-family="Microsoft YaHei, Arial" font-size="18" fill="#1A1A1A">3. **&quot;开源模型将闭源&quot;**：阿里通义等开源策略证明生态价值大于封闭</text>
  
  <text x="60" y="440" font-family="Microsoft YaHei, Arial" font-size="18" fill="#1A1A1A">1. **国产 GPU 能否真正替代**：性能接近但生态差距仍需时间</text>
  
