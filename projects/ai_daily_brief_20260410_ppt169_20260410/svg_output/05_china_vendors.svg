  </text>
  <text x="910" y="335" fill="#999999" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">
    2 月 10 日发布
  </text>
  
  <!-- Bottom summary -->
  <rect x="60" y="420" width="1160" height="180" fill="#F8F9FA" rx="8"/>
  <text x="90" y="465" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">
    中国厂商核心优势
  </text>
  
  <rect x="90" y="485" width="340" height="90" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" rx="6"/>
  <text x="110" y="515" fill="#CF002E" font-family="Arial, Microsoft YaHei, sans-serif" font-size="28" font-weight="bold">多模型</text>
  <text x="110" y="545" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">阿里云 CodingPlan 实现</text>
  <text x="110" y="565" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">四大模型自由切换</text>
  
  <rect x="465" y="485" width="340" height="90" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" rx="6"/>
  <text x="485" y="515" fill="#0066CC" font-family="Arial, Microsoft YaHei, sans-serif" font-size="28" font-weight="bold">长文本</text>
  <text x="485" y="545" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">MiniMax 带动 100K-1M</text>
  <text x="485" y="565" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">Agent 工作流调用需求</text>
  
  <rect x="840" y="485" width="340" height="90" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" rx="6"/>
  <text x="860" y="515" fill="#00AA55" font-family="Arial, Microsoft YaHei, sans-serif" font-size="28" font-weight="bold">端侧部署</text>
  <text x="860" y="545" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">腾讯 2Bit 量化验证</text>
  <text x="860" y="565" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">边缘 AI 设备机会</text>
  
  <!-- Footer -->
  <text x="1220" y="700" text-anchor="end" fill="#999999" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">
    2026-04-10 | 05
  </text>
</svg>
