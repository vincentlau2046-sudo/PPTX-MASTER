  </text>
  <text x="100" y="420" font-family="Arial" font-size="18" fill="#2C3E50" font-weight="bold">
    <tspan>2026 年 AI 行业进入"去伪存真"阶段</tspan>
  </text>
  <g font-family="Arial" font-size="16" fill="#5D6D7E">
    <text x="100" y="460">
      <tspan>• 资本和资源向具备全栈能力和清晰商业化路径的头部企业集中</tspan>
    </text>
    <text x="100" y="490">
      <tspan>• 垂直应用和基础设施两端迎来黄金窗口期</tspan>
    </text>
  </g>
  
  
  <g font-family="Arial">
    <path fill="#005587" d="M88,550 H322 A8,8 0 0 1 330,558 V622 A8,8 0 0 1 322,630 H88 A8,8 0 0 1 80,622 V558 A8,8 0 0 1 88,550 Z" />
    <text x="205" y="585" text-anchor="middle" font-size="32" fill="#FFFFFF" font-weight="bold">3000亿</text>
    <text x="205" y="615" text-anchor="middle" font-size="14" fill="#B8D4E8">Q1 AI 融资总额（美元）</text>
    
    <path fill="#E74C3C" d="M358,550 H592 A8,8 0 0 1 600,558 V622 A8,8 0 0 1 592,630 H358 A8,8 0 0 1 350,622 V558 A8,8 0 0 1 358,550 Z" />
