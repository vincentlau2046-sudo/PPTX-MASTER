<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">技能结构示例：PPT-Master</text>
  <rect x="60" y="90" width="100" height="4" fill="#ed8936" rx="2"/>
  <!-- 目录树 -->
  <g transform="translate(80, 150)">
    <rect width="1120" height="480" rx="12" fill="#1a365d"/>
    <text x="30" y="45" font-family="monospace" font-size="20" font-weight="bold" fill="#ffffff">skills/ppt-master/</text>
    <text x="60" y="90" font-family="monospace" font-size="16" fill="#38b2ac">├── SKILL.md</text>
    <text x="60" y="125" font-family="monospace" font-size="16" fill="#a0aec0">├── scripts/</text>
    <text x="100" y="160" font-family="monospace" font-size="15" fill="#e2e8f0">├── project_manager.py</text>
    <text x="100" y="190" font-family="monospace" font-size="15" fill="#e2e8f0">├── svg_to_pptx.py</text>
    <text x="100" y="220" font-family="monospace" font-size="15" fill="#e2e8f0">├── pdf_to_md.py</text>
    <text x="100" y="250" font-family="monospace" font-size="15" fill="#e2e8f0">├── doc_to_md.py</text>
    <text x="100" y="280" font-family="monospace" font-size="15" fill="#e2e8f0">└── ... (12 个脚本)</text>
    <text x="60" y="320" font-family="monospace" font-size="16" fill="#a0aec0">├── templates/</text>
    <text x="100" y="355" font-family="monospace" font-size="15" fill="#e2e8f0">├── layouts/ (布局模板)</text>
    <text x="100" y="385" font-family="monospace" font-size="15" fill="#e2e8f0">├── charts/ (图表模板)</text>
    <text x="100" y="415" font-family="monospace" font-size="15" fill="#e2e8f0">└── icons/ (图标库)</text>
    <text x="60" y="455" font-family="monospace" font-size="16" fill="#a0aec0">├── workflows/</text>
    <text x="100" y="490" font-family="monospace" font-size="15" fill="#e2e8f0">└── create-template.md</text>
    <text x="60" y="530" font-family="monospace" font-size="16" fill="#ed8936">└── projects/</text>
    <text x="100" y="565" font-family="monospace" font-size="15" fill="#feebc8">└── &lt;项目输出目录&gt;</text>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">12 / 38</text>
</svg>
