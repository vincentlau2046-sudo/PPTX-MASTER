  </text>
  <rect x="80" y="130" width="100" height="4" fill="#E74C3C" />
  
  
  <path fill="#FFF0F0" stroke="#E74C3C" stroke-width="2" d="M88,160 H1192 A8,8 0 0 1 1200,168 V302 A8,8 0 0 1 1192,310 H88 A8,8 0 0 1 80,302 V168 A8,8 0 0 1 88,160 Z" />
  <text x="100" y="200" font-family="Arial" font-size="20" fill="#E74C3C" font-weight="bold">
    <tspan>⚠️ 关键趋势提示</tspan>
  </text>
  <text x="100" y="240" font-family="Arial" font-size="18" fill="#2C3E50">
    <tspan>云厂商从"卖资源"向"卖能力"转型加速</tspan>
  </text>
  <text x="100" y="280" font-family="Arial" font-size="16" fill="#5D6D7E">
    <tspan>阿里云上调价格 2-7%、腾讯云上调 5%，算力供需关系发生根本性逆转</tspan>
  </text>
  
  
  <path fill="#E8F4F8" stroke="#005587" stroke-width="2" d="M88,340 H1192 A8,8 0 0 1 1200,348 V512 A8,8 0 0 1 1192,520 H88 A8,8 0 0 1 80,512 V348 A8,8 0 0 1 88,340 Z" />
