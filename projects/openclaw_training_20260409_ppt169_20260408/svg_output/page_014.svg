<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">SubAgent 工作空间</text>
  <rect x="60" y="90" width="100" height="4" fill="#ed8936" rx="2"/>
  <!-- 工作空间分布图 -->
  <g transform="translate(100, 150)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#1a365d"/>
    <text x="100" y="35" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">workspace/</text>
    <text x="100" y="60" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#a0aec0">主工作空间</text>
    <text x="100" y="75" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#a0aec0">主 Agent 使用</text>
  </g>
  <g transform="translate(100, 260)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#3182ce"/>
    <text x="100" y="35" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">workspace-AI-INTEL/</text>
    <text x="100" y="60" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#bee3f8">ai_intel 专属</text>
  </g>
  <g transform="translate(320, 260)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#38b2ac"/>
    <text x="100" y="35" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">workspace-TECH-ANALYST/</text>
    <text x="100" y="60" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#b2f5ea">tech_analyst 专属</text>
  </g>
  <g transform="translate(540, 260)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#ed8936"/>
    <text x="100" y="35" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">workspace-CONTENT-CREATOR/</text>
    <text x="100" y="60" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#feebc8">content_creator 专属</text>
  </g>
  <g transform="translate(760, 260)">
    <rect x="0" y="0" width="200" height="80" rx="8" fill="#805ad5"/>
    <text x="100" y="35" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">workspace-WORK-PRESENT/</text>
    <text x="100" y="60" text-anchor="middle" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="12" fill="#e9d8fd">work_present 专属</text>
  </g>
  <!-- 关键原则 -->
  <g transform="translate(100, 400)">
    <rect width="1080" height="250" rx="12" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2"/>
    <text x="30" y="45" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#1a365d">关键原则</text>
    <g transform="translate(30, 80)">
      <circle cx="15" cy="15" r="10" fill="#3182ce"/>
      <text x="40" y="20" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#1a365d">子 Agent 继承父工作空间目录</text>
    </g>
    <g transform="translate(30, 120)">
      <circle cx="15" cy="15" r="10" fill="#38b2ac"/>
      <text x="40" y="20" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#1a365d">每个 Agent 有独立的工作空间</text>
    </g>
    <g transform="translate(30, 160)">
      <circle cx="15" cy="15" r="10" fill="#ed8936"/>
      <text x="40" y="20" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#1a365d">通过 task_status.md 跟踪状态</text>
    </g>
    <g transform="translate(30, 200)">
      <circle cx="15" cy="15" r="10" fill="#805ad5"/>
      <text x="40" y="20" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" fill="#1a365d">主 Agent 负责协调和结果汇总</text>
    </g>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">14 / 38</text>
</svg>
