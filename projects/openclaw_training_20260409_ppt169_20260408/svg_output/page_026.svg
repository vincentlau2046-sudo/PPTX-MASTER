<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#f7fafc"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">实战案例：PPT-Master</text>
  <rect x="60" y="90" width="100" height="4" fill="#ed8936" rx="2"/>
  <g transform="translate(60, 140)">
    <rect width="540" height="280" rx="12" fill="#3182ce"/>
    <text x="30" y="45" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">技能背景</text>
    <g transform="translate(30, 80)">
      <circle cx="10" cy="10" r="6" fill="#a0aec0"/>
      <text x="30" y="16" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#e2e8f0">需求：将 Markdown/PDF/DOCX 转换为专业 PPTX</text>
    </g>
    <g transform="translate(30, 115)">
      <circle cx="10" cy="10" r="6" fill="#a0aec0"/>
      <text x="30" y="16" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#e2e8f0">核心功能：SVG 生成、多模板支持、PPTX 导出</text>
    </g>
    <g transform="translate(30, 150)">
      <circle cx="10" cy="10" r="6" fill="#a0aec0"/>
      <text x="30" y="16" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#e2e8f0">开发周期：2 周（含测试和优化）</text>
    </g>
    <g transform="translate(30, 185)">
      <circle cx="10" cy="10" r="6" fill="#a0aec0"/>
      <text x="30" y="16" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" fill="#e2e8f0">已发布到 ClawHub 技能市场</text>
    </g>
    <text x="30" y="250" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" fill="#ed8936">技术亮点</text>
    <text x="30" y="280" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#feebc8">• 原生 PPTX 形状（非图片）• 20+ 专业模板</text>
  </g>
  <g transform="translate(620, 140)">
    <rect width="620" height="500" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <text x="30" y="45" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold" fill="#1a365d">使用示例</text>
    <rect x="30" y="70" width="560" height="400" rx="8" fill="#1a365d"/>
    <text x="50" y="105" font-family="monospace" font-size="14" fill="#a0aec0"># 1. 项目初始化</text>
    <text x="50" y="135" font-family="monospace" font-size="13" fill="#38b2ac">python3 scripts/project_manager.py \</text>
    <text x="70" y="160" font-family="monospace" font-size="13" fill="#38b2ac">init my_presentation --format ppt169</text>
    <text x="50" y="200" font-family="monospace" font-size="14" fill="#a0aec0"># 2. 导入源文件</text>
    <text x="50" y="230" font-family="monospace" font-size="13" fill="#ed8936">python3 scripts/project_manager.py \</text>
    <text x="70" y="255" font-family="monospace" font-size="13" fill="#ed8936">import-sources &lt;project&gt; source.md</text>
    <text x="50" y="295" font-family="monospace" font-size="14" fill="#a0aec0"># 3. 导出 PPTX</text>
    <text x="50" y="325" font-family="monospace" font-size="13" fill="#805ad5">python3 scripts/svg_to_pptx.py &lt;project&gt; \</text>
    <text x="70" y="350" font-family="monospace" font-size="13" fill="#805ad5">-s final</text>
    <text x="50" y="390" font-family="monospace" font-size="14" fill="#a0aec0"># 输出：</text>
    <text x="50" y="420" font-family="monospace" font-size="13" fill="#38b2ac">✅ PPTX 已导出：output.pptx</text>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">26 / 38</text>
</svg>
