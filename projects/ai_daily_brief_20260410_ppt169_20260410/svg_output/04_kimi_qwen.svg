<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CF002E"/>
      <stop offset="100%" stop-color="#8B0020"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- Header bar -->
  <rect x="0" y="0" width="1280" height="80" fill="#F8F9FA"/>
  <rect x="60" y="75" width="1160" height="5" fill="url(#headerGradient)"/>
  
  <!-- Page title -->
  <text x="60" y="50" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="35" font-weight="bold">
    大模型动态：Kimi K2.5 &amp; 阿里 Qwen3.5
  </text>
  
  <!-- Left: Kimi K2.5 -->
  <rect x="60" y="120" width="560" height="480" fill="#FFFFFF" stroke="#0066CC" stroke-width="2" rx="8"/>
  <rect x="60" y="120" width="560" height="50" fill="#0066CC" rx="8"/>
  <text x="90" y="155" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" font-weight="bold">
    Kimi K2.5
  </text>
  
  <text x="90" y="210" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold">
    核心成就
  </text>
  <rect x="90" y="225" width="16" height="16" fill="#0066CC" rx="3"/>
  <text x="115" y="240" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    发布 24 小时登顶 LMarena 开源模型首位
  </text>
  <rect x="90" y="255" width="16" height="16" fill="#0066CC" rx="3"/>
  <text x="115" y="270" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    Artificial Analysis 榜单位列第 5（开源第 1）
  </text>
  
  <text x="90" y="315" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold">
    集群能力
  </text>
  <rect x="90" y="330" width="16" height="16" fill="#0066CC" rx="3"/>
  <text x="115" y="345" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    自主调度 100 个专业背景分身
  </text>
  <rect x="90" y="360" width="16" height="16" fill="#0066CC" rx="3"/>
  <text x="115" y="375" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    并行处理高达 1500 个步骤
  </text>
  <rect x="90" y="390" width="16" height="16" fill="#0066CC" rx="3"/>
  <text x="115" y="405" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    复杂任务效率提升 10 倍+
  </text>
  
  <rect x="90" y="440" width="500" height="60" fill="#F0F7FF" stroke="#0066CC" stroke-width="1" rx="6"/>
  <text x="110" y="470" fill="#0066CC" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold">
    🏆 Kilo Code 宣布 Kimi K2.5 成为默认模型，首周免费
  </text>
  
  <!-- Right: Qwen3.5 -->
  <rect x="660" y="120" width="560" height="480" fill="#FFFFFF" stroke="#CF002E" stroke-width="2" rx="8"/>
  <rect x="660" y="120" width="560" height="50" fill="#CF002E" rx="8"/>
  <text x="690" y="155" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24" font-weight="bold">
    阿里 Qwen3.5 系列
  </text>
  
  <text x="690" y="210" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold">
    架构创新
  </text>
  <rect x="690" y="225" width="16" height="16" fill="#CF002E" rx="3"/>
  <text x="715" y="240" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    Qwen3.5-397B-A17B 混合专家架构 (MoE)
  </text>
  <rect x="690" y="255" width="16" height="16" fill="#CF002E" rx="3"/>
  <text x="715" y="270" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    总参数 3970 亿，激活仅 170 亿
  </text>
  <rect x="690" y="285" width="16" height="16" fill="#CF002E" rx="3"/>
  <text x="715" y="300" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    以小胜大，推理效率大幅提升
  </text>
  
  <text x="690" y="350" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold">
    多模态能力
  </text>
  <rect x="690" y="365" width="16" height="16" fill="#CF002E" rx="3"/>
  <text x="715" y="380" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    支持文本、图像和视频输入
  </text>
  <rect x="690" y="395" width="16" height="16" fill="#CF002E" rx="3"/>
  <text x="715" y="410" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    阿里云百炼推出 qwen3.5-plus/flash
  </text>
  
  <!-- MoE diagram -->
  <rect x="690" y="440" width="500" height="140" fill="#FFF5F5" stroke="#CF002E" stroke-width="1" rx="6"/>
  <text x="710" y="470" fill="#CF002E" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold">
    混合专家架构 (MoE) 示意图
  </text>
  <rect x="710" y="485" width="100" height="60" fill="#CF002E" fill-opacity="0.2" stroke="#CF002E" stroke-width="2" rx="4"/>
  <text x="760" y="520" text-anchor="middle" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">总参数</text>
  <text x="760" y="540" text-anchor="middle" fill="#CF002E" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold">3970 亿</text>
  <text x="840" y="520" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="24">→</text>
  <rect x="870" y="485" width="100" height="60" fill="#FFFFFF" stroke="#CF002E" stroke-width="2" rx="4"/>
  <text x="920" y="520" text-anchor="middle" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">激活参数</text>
  <text x="920" y="540" text-anchor="middle" fill="#CF002E" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold">170 亿</text>
  <text x="1020" y="520" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">激活率≈4.3%</text>
  
  <!-- Footer -->
  <text x="1220" y="700" text-anchor="end" fill="#999999" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">
    2026-04-10 | 04
  </text>
</svg>
