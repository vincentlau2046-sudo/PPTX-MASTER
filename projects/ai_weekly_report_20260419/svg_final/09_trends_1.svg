    <text x="170" y="370">• 仅 24 笔基础 AI 投资吸走 1780 亿美元</text>
    <text x="170" y="395">• 尾部初创公司生存空间被压缩</text>
  </g>
  <path fill="#28A745" d="M174,410 H266 A4,4 0 0 1 270,414 V426 A4,4 0 0 1 266,430 H174 A4,4 0 0 1 170,426 V414 A4,4 0 0 1 174,410 Z" />
  <text x="220" y="425" text-anchor="middle" font-family="Arial" font-size="11" fill="#FFFFFF">强信号 ✅</text>
  
  
  <path fill="#F0F4F8" stroke="#5D6D7E" stroke-width="2" d="M88,460 H1192 A8,8 0 0 1 1200,468 V612 A8,8 0 0 1 1192,620 H88 A8,8 0 0 1 80,612 V468 A8,8 0 0 1 88,460 Z" />
  <circle cx="120" cy="540" r="30" fill="#5D6D7E" />
