<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#CF002E"/>
      <stop offset="100%" stop-color="#8B0020"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="#FFFFFF"/>
  
  <!-- Header bar -->
  <rect x="0" y="0" width="1280" height="80" fill="#F8F9FA"/>
  <rect x="60" y="75" width="1160" height="5" fill="url(#headerGradient)"/>
  
  <!-- Page title -->
  <text x="60" y="50" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="35" font-weight="bold">
    美国厂商 AI 动态
  </text>
  
  <!-- Left: Anthropic 诉讼事件 -->
  <rect x="60" y="120" width="560" height="480" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" rx="8"/>
  <rect x="60" y="120" width="560" height="50" fill="#333333" rx="8"/>
  <text x="90" y="155" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">
    OpenAI、Google 员工支持 Anthropic
  </text>
  
  <text x="90" y="210" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold">
    事件背景
  </text>
  <rect x="90" y="225" width="500" height="90" fill="#F8F9FA" rx="6"/>
  <text x="110" y="255" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17">
    Anthropic 拒绝让国防部 unrestricted access 其 AI 模型后，
  </text>
  <text x="110" y="285" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17">
    被标记为供应链风险
  </text>
  
  <text x="90" y="350" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold">
    行业响应
  </text>
  <rect x="90" y="365" width="16" height="16" fill="#333333" rx="3"/>
  <text x="115" y="380" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    30+ 名员工提交法庭之友简报
  </text>
  <rect x="90" y="395" width="16" height="16" fill="#333333" rx="3"/>
  <text x="115" y="410" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    来自 OpenAI 和 Google DeepMind
  </text>
  <rect x="90" y="425" width="16" height="16" fill="#333333" rx="3"/>
  <text x="115" y="440" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    包括 Google DeepMind 首席科学家 Jeff Dean
  </text>
  
  <rect x="90" y="480" width="500" height="80" fill="#F8F9FA" stroke="#333333" stroke-width="1" rx="6"/>
  <text x="110" y="510" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="17" font-weight="bold">
    💡 行业影响
  </text>
  <text x="110" y="540" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16">
    OpenAI 员工公开支持竞争对手，反映 AI 行业对军事应用的伦理担忧
  </text>
  
  <!-- Right: Google Genie 3 -->
  <rect x="660" y="120" width="560" height="480" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1" rx="8"/>
  <rect x="660" y="120" width="560" height="50" fill="#4285F4" rx="8"/>
  <text x="690" y="155" fill="#FFFFFF" font-family="Arial, Microsoft YaHei, sans-serif" font-size="22" font-weight="bold">
    Google DeepMind Genie 3
  </text>
  
  <text x="690" y="210" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold">
    世界模型 (World Model)
  </text>
  <rect x="690" y="225" width="500" height="180" fill="#F0F7FF" rx="6"/>
  
  <!-- Diagram placeholder -->
  <rect x="720" y="250" width="150" height="120" fill="#FFFFFF" stroke="#4285F4" stroke-width="2" rx="8"/>
  <text x="795" y="290" text-anchor="middle" fill="#4285F4" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold">用户输入</text>
  <text x="795" y="315" text-anchor="middle" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">文本/图像</text>
  <polygon points="870,310 900,310 900,305 910,315 900,325 900,320 870,320" fill="#4285F4"/>
  <rect x="910" y="250" width="150" height="120" fill="#FFFFFF" stroke="#4285F4" stroke-width="2" rx="8"/>
  <text x="985" y="290" text-anchor="middle" fill="#4285F4" font-family="Arial, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold">世界模拟</text>
  <text x="985" y="315" text-anchor="middle" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14">实时交互</text>
  <polygon points="1060,310 1090,310 1090,305 1100,315 1090,325 1090,320 1060,320" fill="#4285F4"/>
  <rect x="1100" y="250" width="60" height="120" fill="#FFFFFF" stroke="#4285F4" stroke-width="2" rx="8"/>
  <text x="1130" y="290" text-anchor="middle" fill="#4285F4" font-family="Arial, Microsoft YaHei, sans-serif" font-size="14" font-weight="bold">输出</text>
  <text x="1130" y="315" text-anchor="middle" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="12">交互世界</text>
  
  <text x="690" y="440" fill="#333333" font-family="Arial, Microsoft YaHei, sans-serif" font-size="20" font-weight="bold">
    技术特点
  </text>
  <rect x="690" y="455" width="16" height="16" fill="#4285F4" rx="3"/>
  <text x="715" y="470" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    用户可生成世界模拟并实时交互
  </text>
  <rect x="690" y="485" width="16" height="16" fill="#4285F4" rx="3"/>
  <text x="715" y="500" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    在社交媒体引发热议
  </text>
  <rect x="690" y="515" width="16" height="16" fill="#4285F4" rx="3"/>
  <text x="715" y="530" fill="#666666" font-family="Arial, Microsoft YaHei, sans-serif" font-size="18">
    基础世界模型新突破
  </text>
  
  <!-- Footer -->
  <text x="1220" y="700" text-anchor="end" fill="#999999" font-family="Arial, Microsoft YaHei, sans-serif" font-size="13">
    2026-04-10 | 06
  </text>
</svg>
