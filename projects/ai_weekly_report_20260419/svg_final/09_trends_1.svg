    <text x="170" y="575">• 行业进入"合规化、资本化、商业化"下半场</text>
  </g>
  <path fill="#28A745" d="M174,590 H266 A4,4 0 0 1 270,594 V606 A4,4 0 0 1 266,610 H174 A4,4 0 0 1 170,606 V594 A4,4 0 0 1 174,590 Z" />
