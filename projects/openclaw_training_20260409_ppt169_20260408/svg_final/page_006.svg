<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect width="1280" height="8" fill="#1a365d"/>
  <text x="60" y="70" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="36" font-weight="bold" fill="#1a365d">核心组件表</text>
  <rect x="60" y="90" width="100" height="4" fill="#ed8936" rx="2"/>
  <!-- 表格 -->
  <g transform="translate(60, 130)">
    <rect width="1160" height="480" fill="#f7fafc" stroke="#e2e8f0" stroke-width="2" rx="8"/>
    <!-- 表头 -->
    <rect x="0" y="0" width="1160" height="50" fill="#1a365d"/>
    <text x="30" y="32" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">组件</text>
    <text x="400" y="32" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">职责</text>
    <text x="900" y="32" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">关键配置</text>
    <!-- 行1 -->
    <rect x="0" y="50" width="1160" height="60" fill="#ebf8ff"/>
    <text x="30" y="85" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">Gateway</text>
    <text x="230" y="85" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">核心服务，管理所有组件</text>
    <text x="730" y="85" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">~/.openclaw/openclaw.json</text>
    <!-- 行2 -->
    <rect x="0" y="110" width="1160" height="60" fill="#ffffff"/>
    <text x="30" y="145" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">Session Manager</text>
    <text x="230" y="145" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">会话生命周期管理</text>
    <text x="730" y="145" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">sessions_spawn, sessions_list</text>
    <!-- 行3 -->
    <rect x="0" y="170" width="1160" height="60" fill="#fef3e2"/>
    <text x="30" y="205" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">Cron Scheduler</text>
    <text x="230" y="205" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">定时任务调度</text>
    <text x="730" y="205" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">cron add/update/run</text>
    <!-- 行4 -->
    <rect x="0" y="230" width="1160" height="60" fill="#ffffff"/>
    <text x="30" y="265" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">Skills Engine</text>
    <text x="230" y="265" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">技能加载和执行</text>
    <text x="730" y="265" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">skills/&lt;skill-name&gt;/SKILL.md</text>
    <!-- 行5 -->
    <rect x="0" y="290" width="1160" height="60" fill="#e6fffa"/>
    <text x="30" y="325" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">Memory System</text>
    <text x="230" y="325" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">记忆存储和检索</text>
    <text x="730" y="325" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">MEMORY.md, memory/, self-improving/</text>
    <!-- 行6 -->
    <rect x="0" y="350" width="1160" height="60" fill="#ffffff"/>
    <text x="30" y="385" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="15" font-weight="bold" fill="#1a365d">Tools Proxy</text>
    <text x="230" y="385" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#4a5568">工具调用代理</text>
    <text x="730" y="385" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#718096">exec, message, web_search 等</text>
  </g>
  <text x="1240" y="700" text-anchor="end" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="14" fill="#a0aec0">06 / 38</text>
</svg>
